<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Rental Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root {
            --pixel-blue: #8ecae6;
            --pixel-pink: #ffb7ff;
            --dark-blue: #219ebc;
            --white: #ffffff;
        }

        body {
            background-color: #f0f8ff;
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* Container หลัก */
        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        /* หัวข้อเว็บ */
        .header {
            text-align: center;
            padding: 40px;
            background: var(--pixel-blue);
            border: 6px solid #000;
            box-shadow: 8px 8px 0px var(--pixel-pink);
            margin-bottom: 40px;
        }

        /* การ์ดสินค้า/เว็บให้เช่า */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .pixel-card {
            background: var(--white);
            border: 4px solid #000;
            padding: 20px;
            position: relative;
            transition: transform 0.2s;
            box-shadow: 5px 5px 0px #000;
        }

        .pixel-card:hover {
            transform: translate(-2px, -2px);
            box-shadow: 7px 7px 0px var(--pixel-pink);
        }

        .pixel-card h3 {
            font-size: 14px;
            color: var(--dark-blue);
        }

        .price {
            color: #ff66b2;
            margin: 15px 0;
            font-size: 12px;
        }

        /* ปุ่มสไตล์ Pixel */
        .pixel-btn {
            display: inline-block;
            padding: 10px 15px;
            background: var(--pixel-pink);
            border: 3px solid #000;
            text-decoration: none;
            color: #000;
            font-size: 10px;
            cursor: pointer;
            box-shadow: 4px 4px 0px #000;
        }

        .pixel-btn:active {
            box-shadow: 0px 0px 0px #000;
            transform: translate(4px, 4px);
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>PIXEL RENT</h1>
        <p style="font-size: 10px; margin-top: 10px;">เว็บเช่าระบบ ธีมฟ้า-ชมพู</p>
    </div>

    <div class="grid">
        <div class="pixel-card">
            <h3>Standard Shop</h3>
            <p style="font-size: 8px;">เหมาะสำหรับเริ่มต้น</p>
            <div class="price">150 THB / Month</div>
            <a href="#" class="pixel-btn">เช่าตอนนี้</a>
        </div>

        <div class="pixel-card" style="border-color: var(--pixel-blue);">
            <h3>Pro Gaming</h3>
            <p style="font-size: 8px;">ระบบครบวงจร</p>
            <div class="price">300 THB / Month</div>
            <a href="#" class="pixel-btn" style="background: var(--pixel-blue);">เช่าตอนนี้</a>
        </div>

        <div class="pixel-card">
            <h3>Custom Design</h3>
            <p style="font-size: 8px;">ออกแบบตามใจคุณ</p>
            <div class="price">Contact Us</div>
            <a href="#" class="pixel-btn">สอบถาม</a>
        </div>
    </div>
</div>

</body>
</html>
