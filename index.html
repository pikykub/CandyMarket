<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyMarket | Peachweb-store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fff5f7; font-family: 'Kanit', sans-serif; color: #5a5a5a; overflow-x: hidden; }
        .grid-bg { background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px); background-size: 25px 25px; }
        .candy-text { background: linear-gradient(to right, #ff8da1, #8ec5fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* 🎀 Contact Modal & Chibi (ป้ายดึงขึ้น) */
        .contact-overlay {
            position: fixed; inset: 0; background: rgba(0, 0, 0, 0.3);
            backdrop-blur: 5px; z-index: 10005; display: none; align-items: center; justify-content: center; padding: 20px;
        }
        .contact-card {
            background: white; width: 100%; max-width: 380px; border-radius: 2.5rem;
            padding: 25px; position: relative; margin-top: 50px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            transform: translateY(100%); opacity: 0; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .contact-card.show { transform: translateY(0); opacity: 1; }
        .chibi-header { position: absolute; top: -100px; left: 50%; transform: translateX(-50%); width: 180px; z-index: 10; }

        /* 🎀 UI Components */
        .btn-login { background: linear-gradient(to right, #f07ab0, #ffb347); color: white; padding: 8px 25px; border-radius: 50px; font-size: 14px; font-weight: 900; box-shadow: 0 4px 15px rgba(240, 122, 176, 0.3); }
        .control-panel { position: absolute; top: 75px; right: 20px; width: 250px; background: white; border-radius: 2rem; padding: 20px; box-shadow: 0 15px 35px rgba(240, 122, 176, 0.15); display: none; z-index: 100; }
        .float-btns { position: fixed; bottom: 20px; left: 0; width: 100%; display: flex; justify-content: center; gap: 10px; padding: 0 20px; z-index: 40; }
        .btn-pill { background: white; border-radius: 50px; padding: 10px 15px; display: flex; align-items: center; gap: 10px; box-shadow: 0 10px 25px rgba(240, 122, 176, 0.1); border: 1px solid #fff; flex: 1; }
        
        #loader { position: fixed; inset: 0; background: #fff5f7; z-index: 9999; display: flex; justify-content: center; align-items: center; transition: 0.5s; }
        .cookie-spin { font-size: 50px; color: #f07ab0; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="grid-bg pb-32">

    <div id="loader"><div class="cookie-spin"><i class="fa-solid fa-cookie-bite"></i></div></div>

    <header class="flex justify-between items-center px-6 py-4 sticky top-0 bg-white/80 backdrop-blur-md z-50">
        <h1 class="text-2xl font-black candy-text">CandyMarket.</h1>
        <div id="auth-section">
            <button onclick="togglePanel()" class="btn-login">เข้าสู่ระบบ</button>
        </div>
        
        <div id="user-panel" class="control-panel">
            <div class="flex items-center gap-4 p-2 mb-4 bg-pink-50 rounded-2xl">
                <div class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-pink-400 shadow-sm"><i class="fa-solid fa-ice-cream"></i></div>
                <span class="font-black text-pink-500 text-sm">ยินดีต้อนรับค่ะ!</span>
            </div>
            <div class="space-y-1">
                <div class="flex items-center gap-3 p-3 hover:bg-pink-50 rounded-xl cursor-pointer"><i class="fa-solid fa-user-gear text-pink-400"></i> <span class="text-sm font-bold">จัดการโปรไฟล์</span></div>
                <div class="flex items-center gap-3 p-3 hover:bg-blue-50 rounded-xl cursor-pointer"><i class="fa-solid fa-desktop text-blue-400"></i> <span class="text-sm font-bold">สถานะเว็บ</span></div>
                <div class="flex items-center gap-3 p-3 hover:bg-yellow-50 rounded-xl cursor-pointer"><i class="fa-solid fa-wallet text-yellow-400"></i> <span class="text-sm font-bold">เติมเงิน</span></div>
            </div>
            <hr class="my-3 border-pink-50">
            <button class="w-full text-center py-2 text-red-400 font-black text-[10px]">LOGOUT</button>
        </div>
    </header>

    <div class="mx-5 mt-4 mb-4">
        <div class="relative rounded-[3rem] overflow-hidden bg-gradient-to-br from-[#bfe9ff] via-[#ffcaf2] to-[#ffbdc7] p-8 min-h-[200px] flex flex-col justify-center border-4 border-white shadow-xl">
            <h3 class="text-5xl font-black italic tracking-tighter text-white drop-shadow-md">CANDY<br>RENTAL</h3>
            <p class="text-xs text-white/90 mt-2 font-bold italic underline">รายวัน / รายเดือน สดใสที่สุดในโลก!</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 px-5 mb-6 text-center">
        <div class="bg-white p-4 rounded-[2rem] border-2 border-pink-50 shadow-sm">
            <p class="text-pink-300 text-[10px] font-black uppercase">ลูกค้าที่น่ารัก</p>
            <h4 class="text-2xl font-black text-[#f07ab0]" id="stat-users">0</h4>
        </div>
        <div class="bg-white p-4 rounded-[2rem] border-2 border-blue-50 shadow-sm">
            <p class="text-blue-300 text-[10px] font-black uppercase">ขนมในร้าน</p>
            <h4 class="text-2xl font-black text-[#7db9f9]" id="stat-prods">0</h4>
        </div>
    </div>

    <div class="px-5 mb-10">
        <h3 class="text-lg font-black text-gray-700 mb-4 flex items-center gap-2">
            <i class="fa-solid fa-gift text-pink-400"></i> รายการแนะนำ
        </h3>
        <div class="grid grid-cols-2 gap-4" id="product-container">
            </div>
    </div>

    <div class="float-btns">
        <button onclick="openContact()" class="btn-pill">
            <div class="text-left"><p class="text-[9px] font-black text-blue-300 uppercase leading-none">แจ้งปัญหา</p><h5 class="text-xl font-black text-blue-400 italic leading-none">CHAT</h5></div>
            <div class="w-10 h-10 rounded-full bg-blue-400 text-white flex items-center justify-center shadow-lg shadow-blue-200"><i class="fa-solid fa-comment-dots"></i></div>
        </button>
        <button class="btn-pill">
            <div class="text-left"><p class="text-[9px] font-black text-pink-300 uppercase leading-none">วิธีสั่งซื้อ</p><h5 class="text-xl font-black text-pink-400 italic leading-none">GUIDE</h5></div>
            <div class="w-10 h-10 rounded-full bg-pink-400 text-white flex items-center justify-center shadow-lg shadow-pink-200"><i class="fa-solid fa-star"></i></div>
        </button>
    </div>

    <div id="contact-modal" class="contact-overlay" onclick="closeContact()">
        <div class="contact-card" onclick="event.stopPropagation()">
            <img src="https://img5.pic.in.th/file/secure-sv1/image0045437937397b98.png" class="chibi-header">
            <div class="text-center mt-10 mb-6">
                <h3 class="text-2xl font-black text-pink-400 italic uppercase">Contact Us</h3>
                <p class="text-[10px] text-gray-400 font-bold">เลือกช่องทางที่สะดวกได้เลยค่ะ</p>
            </div>
            <a href="https://www.facebook.com/share/1KVCB1cc5c/" target="_blank" class="flex items-center p-4 mb-3 bg-blue-50 rounded-2xl border border-blue-100">
                <div class="w-12 h-12 bg-blue-500 text-white rounded-xl flex items-center justify-center text-xl mr-4"><i class="fa-brands fa-facebook-f"></i></div>
                <div class="text-left"><h4 class="font-black text-blue-600 text-sm">Facebook Page</h4><p class="text-[9px] text-blue-400">ติดต่อผ่านหน้าเพจโดยตรง</p></div>
            </a>
            <a href="https://lin.ee/YdAzm8t" target="_blank" class="flex items-center p-4 mb-6 bg-green-50 rounded-2xl border border-green-100">
                <div class="w-12 h-12 bg-green-500 text-white rounded-xl flex items-center justify-center text-xl mr-4"><i class="fa-brands fa-line"></i></div>
                <div class="text-left"><h4 class="font-black text-green-600 text-sm">Line Official</h4><p class="text-[9px] text-green-400">แชทผ่านไลน์กับแอดมิน</p></div>
            </a>
            <button onclick="closeContact()" class="w-full py-3 bg-pink-50 text-pink-400 rounded-2xl font-black text-xs uppercase italic">ดันป้ายเก็บขึ้นไป</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        
        const firebaseConfig = { apiKey: "AIzaSyBORnXLQdZnETh9AMFMUx50FlLylKCVc2w", authDomain: "web-rental-system-d8894.firebaseapp.com", projectId: "web-rental-system-d8894", databaseURL: "https://web-rental-system-d8894-default-rtdb.asia-southeast1.firebasedatabase.app" };
        const app = initializeApp(firebaseConfig); const db = getDatabase(app);

        window.togglePanel = () => { const p = document.getElementById('user-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; };
        window.openContact = () => { document.getElementById('contact-modal').style.display = 'flex'; setTimeout(() => document.querySelector('.contact-card').classList.add('show'), 50); };
        window.closeContact = () => { document.querySelector('.contact-card').classList.remove('show'); setTimeout(() => document.getElementById('contact-modal').style.display = 'none', 400); };
        
        onValue(ref(db, 'products'), s => {
            const c = document.getElementById('product-container'); c.innerHTML = '';
            s.forEach(child => {
                const p = child.val();
                c.innerHTML += `<div class="bg-white rounded-[2rem] p-3 shadow-sm border border-pink-50 flex flex-col"><img src="${p.image}" class="rounded-[1.5rem] mb-3 aspect-square object-cover"><h4 class="font-bold text-sm text-gray-700 truncate">${p.name}</h4><p class="text-pink-500 font-black text-lg mb-2">฿${p.price}</p><button class="bg-pink-50 text-pink-500 py-2 rounded-xl text-[10px] font-black">ดูตัวอย่าง</button></div>`;
            });
        });

        onValue(ref(db, 'stats'), s => {
            const d = s.val()||{};
            document.getElementById('stat-users').innerText = d.users||0;
            document.getElementById('stat-prods').innerText = d.prods||0;
        });

        window.onload = () => { setTimeout(() => { document.getElementById('loader').style.opacity = '0'; setTimeout(() => document.getElementById('loader').style.display = 'none', 500); }, 800); };
    </script>
</body>
</html>
