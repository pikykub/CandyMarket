<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyMarket | ระบบเช่าเว็บไซต์ & สถานะ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fff5f7; font-family: 'Kanit', sans-serif; color: #5a5a5a; overflow-x: hidden; }
        .grid-bg { background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px); background-size: 25px 25px; }
        .candy-text { background: linear-gradient(to right, #ff8da1, #8ec5fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ✨ Fixed Floating Panel (แก้ปัญหาที่พีชเจอ) */
        .user-panel-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 192, 203, 0.2);
            backdrop-filter: blur(4px);
            z-index: 99999;
            display: none; /* ปิดไว้ก่อน */
            justify-content: center;
            align-items: flex-start;
            padding-top: 80px;
        }

        .control-panel {
            width: 90%;
            max-width: 320px;
            background: white;
            border-radius: 2.5rem;
            padding: 25px;
            box-shadow: 0 20px 50px rgba(240, 122, 176, 0.25);
            border: 5px solid #fff;
            transform: translateY(-20px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .user-panel-overlay.active { display: flex; }
        .user-panel-overlay.active .control-panel { transform: translateY(0); }

        /* 🌈 Rainbow Name & Animations */
        .admin-rainbow-text {
            background: linear-gradient(to right, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400);
            background-size: 400% 400%;
            animation: rainbow 3s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900 !important;
        }
        @keyframes rainbow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .owner-badge {
            background: linear-gradient(45deg, #ff9a9e, #fecfef);
            color: #ff4d6d;
            padding: 2px 12px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.2);
        }

        /* Status UI */
        .status-card { background: white; border-radius: 2rem; border: 3px solid #fff; transition: 0.3s; margin-bottom: 12px; }
        .dot-online { background: #22c55e; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; }
        .dot-offline { background: #ef4444; }
        .dot-pending { background: #eab308; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(1.1); } 100% { opacity: 1; transform: scale(1); } }

        .menu-item { display: flex; align-items: center; gap: 15px; padding: 14px; border-radius: 20px; cursor: pointer; transition: 0.3s; color: #666; font-weight: 500; }
        .menu-item:hover { background: #fff0f3; transform: scale(1.02); }
        
        #loader { position: fixed; inset: 0; background: #fff5f7; z-index: 999999; display: flex; justify-content: center; align-items: center; }
        .cookie-spin i { font-size: 50px; color: #f07ab0; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .admin-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.1); backdrop-filter: blur(10px); z-index: 100000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .pop-card { background: white; border-radius: 3rem; padding: 30px; width: 100%; max-width: 450px; border: 5px solid #fff; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
    </style>
</head>
<body class="grid-bg pb-20">

    <div id="loader"><div class="cookie-spin"><i class="fa-solid fa-cookie-bite"></i></div></div>

    <header class="flex justify-between items-center px-6 py-4 sticky top-0 bg-white/90 backdrop-blur-md z-[50] border-b border-pink-100">
        <h1 class="text-2xl font-black candy-text">CandyMarket.</h1>
        <div id="auth-section">
            </div>
    </header>

    <div id="user-panel-overlay" class="user-panel-overlay" onclick="togglePanel()">
        <div class="control-panel" onclick="event.stopPropagation()">
            <div class="flex items-center gap-4 pb-4 border-b border-pink-50 mb-4">
                <img id="panel-img" src="" class="w-14 h-14 rounded-full border-4 border-pink-100 object-cover shadow-sm">
                <div>
                    <p class="text-[10px] font-black text-gray-300 uppercase tracking-widest leading-none mb-1">Welcome back!</p>
                    <h4 id="panel-name" class="text-lg leading-tight">Guest</h4>
                    <div id="panel-badge" class="mt-1"></div>
                </div>
            </div>

            <div class="space-y-1">
                <div onclick="alert('ไปหน้าโปรไฟล์')" class="menu-item">
                    <div class="w-10 h-10 rounded-2xl bg-pink-50 text-pink-500 flex items-center justify-center shadow-sm"><i class="fa-solid fa-user-pen"></i></div>
                    <span class="text-sm">จัดการโปรไฟล์</span>
                </div>
                <div onclick="openStatusPage()" class="menu-item">
                    <div class="w-10 h-10 rounded-2xl bg-blue-50 text-blue-500 flex items-center justify-center shadow-sm"><i class="fa-solid fa-desktop"></i></div>
                    <span class="text-sm">สถานะเว็บ</span>
                </div>
                <div class="menu-item">
                    <div class="w-10 h-10 rounded-2xl bg-yellow-50 text-yellow-400 flex items-center justify-center shadow-sm"><i class="fa-solid fa-wallet"></i></div>
                    <span class="text-sm">เติมเงิน</span>
                </div>
                
                <div id="admin-only-tools" class="hidden pt-2">
                    <hr class="mb-3 border-pink-50">
                    <div onclick="openAdminModal()" class="menu-item text-blue-600 font-bold bg-blue-50/50">
                        <div class="w-10 h-10 rounded-2xl bg-blue-500 text-white flex items-center justify-center shadow-md"><i class="fa-solid fa-hammer"></i></div>
                        <span class="text-sm italic">จัดการหลังบ้าน</span>
                    </div>
                </div>
            </div>

            <button onclick="handleLogout()" class="w-full mt-6 py-3 text-[10px] font-black text-gray-400 uppercase tracking-[3px] border-t border-pink-50 pt-4 hover:text-pink-500 transition">Logout</button>
        </div>
    </div>

    <div class="p-5">
        <div class="rounded-[3rem] bg-gradient-to-br from-[#ffcad4] to-[#ff8da1] p-10 text-white shadow-xl relative overflow-hidden border-4 border-white">
            <h2 class="text-5xl font-black italic leading-[0.8] mb-2">CANDY<br>RENTAL</h2>
            <p class="text-xs font-bold opacity-80 tracking-widest uppercase">รายวัน / รายเดือน สดใสที่สุดในโลก!</p>
            <div class="absolute -bottom-5 -right-5 opacity-20 text-9xl rotate-12"><i class="fa-solid fa-cookie-bite"></i></div>
        </div>
    </div>

    <div id="status-modal" class="admin-modal">
        <div class="pop-card overflow-y-auto max-h-[80vh]">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-2xl font-black candy-text italic">WEB STATUS</h3>
                <button onclick="closeModal('status-modal')" class="text-gray-300"><i class="fa-solid fa-circle-xmark text-2xl"></i></button>
            </div>
            <div id="status-list" class="space-y-4">
                </div>
        </div>
    </div>

    <div id="admin-modal" class="admin-modal">
        <div class="pop-card">
            <h3 class="text-xl font-black text-gray-700 mb-6 uppercase text-center italic">Admin Peach Manager</h3>
            <div class="space-y-3">
                <input type="text" id="add-web-name" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold" placeholder="ชื่อเว็บไซต์">
                <input type="date" id="add-web-exp" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold">
                <select id="add-web-status" class="w-full p-4 bg-gray-50 rounded-2xl outline-none text-sm font-bold">
                    <option value="online">Online</option>
                    <option value="pending">Pending</option>
                    <option value="offline">Offline</option>
                </select>
                <button onclick="saveNewWeb()" class="w-full py-4 bg-pink-500 text-white rounded-2xl font-black shadow-lg">บันทึกข้อมูล</button>
            </div>
            <button onclick="closeModal('admin-modal')" class="w-full mt-4 text-xs font-bold text-gray-300 uppercase">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, push, set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJEO4o365sI4XFZD4IRIaDjetIMNtCMwU",
            authDomain: "candy-market-system.firebaseapp.com",
            databaseURL: "https://candy-market-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "candy-market-system",
            storageBucket: "candy-market-system.firebasestorage.app",
            messagingSenderId: "955686244672",
            appId: "1:955686244672:web:484fdc3d7192d3074c2aa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // --- Utils ---
        window.togglePanel = () => {
            const overlay = document.getElementById('user-panel-overlay');
            overlay.classList.toggle('active');
        };
        window.openStatusPage = () => { document.getElementById('status-modal').style.display = 'flex'; };
        window.openAdminModal = () => { document.getElementById('admin-modal').style.display = 'flex'; };
        window.closeModal = (id) => { document.getElementById(id).style.display = 'none'; };
        window.handleLogout = () => signOut(auth).then(() => location.reload());

        // --- Save Data (Admin) ---
        window.saveNewWeb = async () => {
            const name = document.getElementById('add-web-name').value;
            const exp = document.getElementById('add-web-exp').value;
            const status = document.getElementById('add-web-status').value;
            if(!name || !exp) return alert('กรอกให้ครบนะคะพีช!');
            await push(ref(db, 'rentals'), { name, exp, status });
            alert('เพิ่มข้อมูลสำเร็จแล้วค่ะ!');
            closeModal('admin-modal');
        };

        // --- Sync Status List ---
        onValue(ref(db, 'rentals'), (snap) => {
            const list = document.getElementById('status-list');
            list.innerHTML = '';
            snap.forEach(child => {
                const data = child.val();
                const diff = new Date(data.exp) - new Date();
                const days = Math.ceil(diff / (1000 * 60 * 60 * 24));
                
                list.innerHTML += `
                    <div class="status-card p-5 shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <h4 class="font-black text-gray-700">${data.name}</h4>
                            <div class="flex items-center gap-2 px-3 py-1 bg-gray-50 rounded-full">
                                <div class="w-2 h-2 rounded-full dot-${data.status}"></div>
                                <span class="text-[10px] font-black uppercase text-gray-400">${data.status}</span>
                            </div>
                        </div>
                        <div class="flex justify-between text-[11px] font-bold text-gray-400">
                            <span>วันหมดอายุ: ${data.exp}</span>
                            <span class="text-pink-400 italic">${days > 0 ? 'เหลือ '+days+' วัน' : 'หมดอายุแล้ว'}</span>
                        </div>
                    </div>
                `;
            });
        });

        // --- Auth & Profile Sync ---
        onAuthStateChanged(auth, (user) => {
            const section = document.getElementById('auth-section');
            if(user) {
                onValue(ref(db, `users/${user.uid}`), (snap) => {
                    const data = snap.val() || {};
                    const isAdmin = (data.username === "AdminPeach" || user.email === "feirnbiddu10@gmail.com");
                    
                    // Header Image (ที่พีชวง)
                    const profileImg = data.profilePic || 'https://i.pinimg.com/736x/8b/11/d8/8b11d886f68c3746c87f607c3c2e6f4a.jpg';
                    section.innerHTML = `
                        <button onclick="togglePanel()" class="w-12 h-12 rounded-full border-2 border-pink-200 overflow-hidden shadow-lg active:scale-90 transition">
                            <img src="${profileImg}" class="w-full h-full object-cover">
                        </button>
                    `;

                    // Panel Details
                    document.getElementById('panel-img').src = profileImg;
                    const nameTag = document.getElementById('panel-name');
                    const badgeTag = document.getElementById('panel-badge');
                    
                    if(isAdmin) {
                        nameTag.innerText = "Admin Peach";
                        nameTag.className = "admin-rainbow-text text-xl italic";
                        badgeTag.innerHTML = `<span class="owner-badge"><i class="fa-solid fa-crown mr-1"></i> OWNER</span>`;
                        document.getElementById('admin-only-tools').classList.remove('hidden');
                    } else {
                        nameTag.innerText = data.nickname || data.username || "Member";
                        badgeTag.innerHTML = `<span class="text-[10px] font-bold text-pink-300 uppercase tracking-widest">Customer</span>`;
                    }
                });
            } else {
                section.innerHTML = `<button onclick="alert('กรุณาเข้าสู่ระบบก่อนน้า')" class="bg-pink-500 text-white px-6 py-2 rounded-full text-xs font-black shadow-lg">Sign In</button>`;
            }
            // Hide Loader
            setTimeout(() => document.getElementById('loader').style.display = 'none', 800);
        });
    </script>
</body>
</html>
