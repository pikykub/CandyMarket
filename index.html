<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyMarket - Pixel Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* สไตล์พื้นฐานและตัวแปรสีพาสเทล */
        :root {
            --pink-bg: #ffe6f2;
            --blue-bg: #dcf2f5;
            --white: #ffffff;
            --candy-pink: #ff99cc;
            --candy-pink-border: #f4a2c1;
            --candy-blue: #ade8f4;
            --candy-yellow: #fff3cd;
            --text-dark: #4a4a4a;
            --text-pink-dark: #d66089;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            image-rendering: pixelated; /* สำคัญ: ทำให้ไอคอนพิกเซลคมชัด */
        }

        body {
            font-family: 'Kanit', sans-serif;
            background: linear-gradient(180deg, var(--pink-bg) 0%, var(--blue-bg) 100%);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        /* Container หลัก */
        .page-container {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(5px);
            border-radius: 20px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ของตกแต่งลอยไปมาแบบพิกเซล (จำลองจาก SVG/DataURI เพื่อไม่ให้มีไฟล์ภาพนอก) */
        .decor { position: absolute; opacity: 0.6; animation: float decor-float infinite; }
        @keyframes decor-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        /* จำลอง Candy พิกเซล */
        .decor.candy-1 {
            top: 10%; left: 5%; width: 32px; height: 32px;
            background: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAM0lEQVRYR+2VwREAMAjDUvdfu0F6E5VzLMAfP/EAVbNidYwDqAbEAVQD4gCqAYfGAXQDjMc9L1w8r28AAAAASUVORK5CYII=;
            animation-duration: 4s;
        }
        .decor.star-1 {
            top: 15%; right: 5%; width: 24px; height: 24px;
            background: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAN0lEQVRIx2NgoA34//8/AxZMbvD////P4w4w/B8G4f8IAnYfhuG4A+w+DMORP8DuwzAc+QMPAAB+E0sIqN6o1AAAAABJRU5ErkJggg==;
            animation-duration: 3s;
        }

        /* Navbar: Responsive */
        .navbar {
            background-color: var(--white);
            padding: 10px 20px;
            border-radius: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 3px solid var(--candy-pink-border);
            width: 100%;
            max-width: 800px;
            margin-bottom: 30px;
            z-index: 10;
        }
        .logo-nav {
            font-weight: 600;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 5px;
            white-space: nowrap;
        }
        .pixel-logo-small { width: 24px; height: 24px; background: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAATklEQVRIx2P8//8/AzUxAxdgYfA/DMOhAZv/IRjODNj8D8FwZsDmfwiGMwM2/0MwnBmw+R+C4cyAzf8QDIdhwA9I84FvHwD9+0sIqN6o1AAAAABJRU5ErkJggg==; }

        .nav-links {
            display: flex;
            gap: 10px;
            font-size: 0.85rem;
        }
        .nav-links span {
            cursor: pointer;
            padding: 5px 10px;
            border-radius: 10px;
            transition: 0.3s;
            white-space: nowrap;
        }
        .nav-links span.active, .nav-links span:hover {
            background-color: var(--pink-bg);
            color: var(--text-pink-dark);
            font-weight: 600;
        }

        /* Title */
        .header-title {
            text-align: center;
            margin: 20px 0;
            width: 100%;
            max-width: 600px;
        }
        .pixel-text-shadow {
            font-family: 'Press Start 2P', cursive;
            font-size: 2.2rem;
            color: white;
            text-shadow: 
                3px 3px 0 #5c5c5c,
                -1px -1px 0 #5c5c5c,
                1px -1px 0 #5c5c5c,
                -1px 1px 0 #5c5c5c,
                1px 1px 0 #5c5c5c;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        .header-title p {
            font-size: 1rem;
            font-weight: 500;
        }

        /* -----------------------------------------------------------
           SECTION 1: ไอคอนบริการพิกเซลแบบจัดองค์ประกอบ (Responsive Grid)
           ----------------------------------------------------------- */
        .pixel-services {
            display: grid;
            grid-template-columns: repeat(3, minmax(150px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin: 30px 0;
            justify-content: center;
        }

        .service-box {
            background: var(--white);
            border: 3px solid var(--candy-pink-border);
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-dark);
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 0 rgba(244, 162, 193, 0.3);
            position: relative;
        }
        .service-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 0 rgba(244, 162, 193, 0.3);
        }

        /* -----------------------------------------------------------------------------------
           จำลอง ไอคอนพิกเซล (จำลองจาก SVG/DataURI เพราะเราไม่เอาสติ๊กเกอร์ และต้องการพิกเซลแท้ๆ)
           ----------------------------------------------------------------------------------- */
        .pixel-icon {
            width: 64px;
            height: 64px;
            margin-bottom: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            image-rendering: pixelated;
        }
        
        /* จำลอง บ้านพิกเซล (Web ครบวงจร) */
        .icon-house {
            background: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAALUlEQVRYR+2VwREAIAjDUvdfK1Yf4X5G5VgI4M8Tf4CqWbE6xgFUA+IAqgFxANWAQ+MBun8BOf/GPC+s588AAAAASUVORK5CYII=;
            /* เพิ่มลูกเล่นพิกเซลลอย: Candy-1 */
            position: relative;
        }
        .icon-house::after {
            content: '';
            position: absolute; bottom: 10px; right: 10px;
            width: 16px; height: 16px;
            background: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAN0lEQVRIx2NgoA34//8/AxZMbvD////P4w4w/B8G4f8IAnYfhuG4A+w+DMORP8DuwzAc+QMPAAB+E0sIqN6o1AAAAABJRU5ErkJggg==;
        }

        /* จำลอง กล่องสมบัติพิกเซล (เรทราคา) */
        .icon-treasure {
            background: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAV0lEQVRYR+2VQQrAIAwEV+ev9K2+40f+Wv+C9QY9lC4tFAW6f5CgEw/D6DCAKkD6CqALgP4C6IcA+XMC5M8JkD8nQP6cAOfOCdB/Z484q3M/xNidw5FwGEYDoAMp4CofX8K/XwAAAABJRU5ErkJggg==;
        }

        /* จำลอง การ์ดพิกเซล (Bio) */
        .icon-card {
            background: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAACAAAAAgCAYAAABzenr0AAAAYklEQVRYR+2VQQ7AIAwDc/dfM5/lE1/5m99XgY5IuNCSG2u+DURXPh7HwwCqAOmLAN0A9B9APwTInxMgf06A/DkB8ucEOHdOgP67dcSzzmEIdY4P4XEYDoAMpIDrX/4vBfgB/9fDPw8XfD8AAAAASUVORK5CYII=;
        }

        /* -----------------------------------------------------------
           SECTION 2: ปุ่มและสถานะพิกเซล (Responsive)
           ----------------------------------------------------------- */
        .main-controls {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 100%;
            max-width: 600px;
            margin-bottom: 80px; /* เว้นที่ให้ปุ่มขอบจอ */
            z-index: 10;
        }

        /* ปุ่มพิกเซลดุ๊กดิ๊ก */
        .pixel-btn-order {
            background-color: #ff8fa3;
            color: white;
            border: 3px solid white;
            padding: 15px;
            border-radius: 20px;
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 0 rgba(255, 143, 163, 0.5);
            animation: btn-shake 2s infinite;
            text-decoration: none;
        }
        .pixel-btn-order:hover {
            transform: scale(1.02);
            box-shadow: 0 6px 0 rgba(255, 143, 163, 0.6);
        }
        @keyframes btn-shake {
            0%, 90% { transform: rotate(0); }
            92% { transform: rotate(2deg); }
            94% { transform: rotate(-2deg); }
            96% { transform: rotate(1deg); }
            98% { transform: rotate(-1deg); }
            100% { transform: rotate(0); }
        }
        .btn-icon { font-size: 1.5rem; }

        /* การ์ดสถานะแบบ Grid-2 */
        .grid-status {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .card {
            background: var(--white);
            border: 3px solid var(--candy-pink-border);
            border-radius: 15px;
            padding: 15px;
            box-shadow: 0 4px 0 rgba(244, 162, 193, 0.3);
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* -----------------------------------------------------------
           SECTION 3: ปุ่มขอบจอ (Responsive & Responsive Buttons)
           ----------------------------------------------------------- */
        .floating-controls {
            width: 100%;
            max-width: 600px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            z-index: 10;
        }

        .pixel-chat-bubble {
            background: var(--white);
            border: 2px solid var(--candy-pink-border);
            padding: 10px 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 0 var(--candy-pink-border);
            transition: 0.3s;
        }
        .pixel-chat-bubble:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 0 var(--candy-pink-border);
        }
        .chat-icon-box {
            display: flex;
            justify-content: center;
            align-items: center;
            animation: chat-bounce 3s infinite;
        }
        @keyframes chat-bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); }
            40% { transform: translateY(-5px); }
            60% { transform: translateY(-3px); }
        }
        /* จำลอง Chat Icon พิกเซล */
        .pixel-chat-icon { width: 24px; height: 24px; background: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABgAAAAYCAYAAADgdz34AAAAKElEQVRIx2NgoA34//8/AxZMbvD////P4w4w/B8G4f8IAnYfhuG4AwcDAAAPp0sIqN6o1AAAAABJRU5ErkJggg==; }

        .pixel-btn-link {
            background-color: var(--white);
            border: 2px solid var(--candy-pink-border);
            padding: 10px 15px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-pink-dark);
            cursor: pointer;
            box-shadow: 0 4px 0 var(--candy-pink-border);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
        }
        .pixel-btn-link:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 0 var(--candy-pink-border);
        }
        /* จำลอง Link Icon พิกเซล */
        .pixel-link-icon { width: 16px; height: 16px; background: data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAAf8/9hAAAAK0lEQVQ4T2NgoAr4//8/AxZMbvD////P4w4w/B8G4f8IAmIfhuG4w8AFAAASd0sIqN6o1AAAAABJRU5ErkJggg==; }

        /* -----------------------------------------------------------
           Media Queries: ปรับให้เข้ากับคอมหน้าจอกว้าง
           ----------------------------------------------------------- */
        @media (min-width: 900px) {
            .page-container {
                padding: 40px;
                flex-direction: column;
                justify-content: center;
            }
            
            .header-title {
                margin: 40px 0;
            }
            .pixel-text-shadow {
                font-size: 3rem;
            }

            .pixel-services {
                grid-template-columns: repeat(3, minmax(200px, 1fr));
                gap: 40px;
                margin: 60px 0;
            }

            .main-controls {
                flex-direction: row; /* เปลี่ยนเป็นแนวนอนบนคอม */
                justify-content: center;
                align-items: center;
                max-width: 800px;
                gap: 30px;
            }
            .pixel-btn-order {
                flex: 2; /* ปุ่มสั่งใหญ่กว่า */
                order: 1;
            }
            .grid-status {
                flex: 1; /* แผงสถานะเล็กกว่า */
                order: 2;
                grid-template-columns: 1fr; /* แผงสถานะซ้อนกันแนวตั้งบนคอม */
            }

            .floating-controls {
                max-width: 800px;
                margin-top: 40px;
            }
        }

        /* -----------------------------------------------------------
           Media Queries: ปรับให้เข้ากับมือถือหน้าจอเล็ก
           ----------------------------------------------------------- */
        @media (max-width: 600px) {
            .pixel-services {
                grid-template-columns: 1fr; /* ไอคอนซ้อนกันแนวตั้งบนมือถือเล็ก */
                gap: 15px;
            }
            .navbar {
                flex-direction: column;
                gap: 10px;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="page-container">
        <div class="decor candy-1"></div>
        <div class="decor star-1"></div>

        <nav class="navbar">
            <div class="logo-nav">
                <div class="pixel-logo-small"></div>
                CandyMarket
            </div>
            <div class="nav-links">
                <span class="active">หน้าแรก</span>
                <span>ผลงาน</span>
                <span>วิธีการสั่ง</span>
                <span>ติดต่อเรา</span>
            </div>
        </nav>

        <div class="header-title">
            <h1 class="pixel-text-shadow">CandyMarket</h1>
            <p>Welcome to my shop <span style="animation:decor-float 1s infinite alternate">✨</span><br>บริการเว็บไซต์น่ารักๆ สไตล์พิกเซล...</p>
        </div>

        <section class="pixel-services">
            <div class="service-box">
                <div class="pixel-icon icon-house"></div>
                เว็บครบวงจร
            </div>
            <div class="service-box">
                <div class="pixel-icon icon-treasure"></div>
                เว็บเรทราคา/เติมเกม
            </div>
            <div class="service-box">
                <div class="pixel-icon icon-card"></div>
                เว็บไบโอ (Bio)
            </div>
        </section>

        <section class="main-controls">
            <a href="#" class="pixel-btn-order">
                <span class="btn-icon">📝</span>
                กดสั่งทำ & ระบุรายละเอียดบรีฟ
            </a>

            <div class="grid-status">
                <div class="card card-smallA">A01</div>
                <div class="card card-smallQ">กำลังรอ...</div>
            </div>
        </section>

        <section class="floating-controls">
            <button class="pixel-btn-link">
                <div class="pixel-link-icon"></div>
                🌐 ช่องทางอื่นๆ
            </button>
            
            <div class="pixel-chat-bubble">
                <div class="chat-icon-box">
                    <div class="pixel-chat-icon"></div>
                </div>
                ติดต่อสอบถาม
            </div>
        </section>

    </div>

</body>
</html>
