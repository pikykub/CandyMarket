<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Candy Web Rental</title>
    <link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;600&family=Silkscreen&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FFB6C1;
            --blue: #87CEFA;
            --purple: #DDA0DD;
            --white: #FFFFFF;
            --dark: #555555;
        }

        body {
            font-family: 'Mali', cursive;
            margin: 0;
            padding: 0;
            /* พื้นหลังสีพาสเทลขยับได้ (ไม่มีทางจอดำแน่นอน) */
            background: repeating-linear-gradient(
                -45deg,
                var(--pink),
                var(--pink) 20px,
                var(--blue) 20px,
                var(--blue) 40px,
                var(--purple) 40px,
                var(--purple) 60px
            );
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            display: flex;
            justify-content: center;
        }

        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* กรอบจำลองหน้าจอมือถือ */
        .mobile-container {
            width: 100%;
            max-width: 400px;
            background-color: var(--white);
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
            position: relative;
            padding-bottom: 80px; /* เผื่อที่ให้แถบด้านล่าง */
        }

        /* สไตล์ Pixel */
        .pixel-border {
            border: 4px solid var(--dark);
            box-shadow: 4px 4px 0px var(--pink);
            border-radius: 0;
            background-color: var(--white);
        }

        .header {
            background-color: var(--pink);
            padding: 20px;
            text-align: center;
            font-family: 'Silkscreen', sans-serif;
            border-bottom: 4px solid var(--dark);
        }

        .header h1 {
            margin: 0;
            color: var(--white);
            text-shadow: 2px 2px 0px var(--dark);
            font-size: 1.5rem;
        }

        .content {
            padding: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            color: var(--dark);
        }

        select, input[type="text"] {
            width: 90%;
            padding: 10px;
            font-family: 'Mali', cursive;
            font-size: 1rem;
            outline: none;
        }

        /* แถบด้านล่าง */
        .bottom-bar {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 400px;
            background-color: var(--white);
            border-top: 4px solid var(--dark);
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .btn-pixel {
            background-color: var(--pink);
            color: var(--white);
            font-family: 'Mali', cursive;
            font-weight: 600;
            padding: 10px 20px;
            cursor: pointer;
            text-shadow: 1px 1px 0px var(--dark);
            transition: transform 0.1s;
        }

        .btn-pixel:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px var(--dark);
        }

        /* หน้าโหลดพิกเซล */
        .loader-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(255,255,255,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 100;
        }

        .pixel-spinner {
            width: 40px;
            height: 40px;
            background-color: var(--blue);
            animation: spin 1s step-end infinite;
            box-shadow: 5px 5px 0px var(--pink);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(90deg); }
            50% { transform: rotate(180deg); }
            75% { transform: rotate(270deg); }
            100% { transform: rotate(360deg); }
        }

    </style>
</head>
<body>

    <div class="mobile-container">
        <div class="header">
            <h1>CANDY WEB</h1>
        </div>

        <div class="content">
            <div class="form-group">
                <label>🍧 เลือกสไตล์ที่ชอบ:</label>
                <select class="pixel-border">
                    <option>สไตล์ Pixel Art (ยอดฮิต)</option>
                    <option>สไตล์ Pastel หวานๆ</option>
                    <option>สไตล์ Minimal</option>
                </select>
            </div>

            <div class="form-group">
                <label>🍭 ชื่อร้านของคุณ:</label>
                <input type="text" class="pixel-border" placeholder="พิมพ์ชื่อร้านตรงนี้...">
            </div>
            
            <p style="font-size: 0.9em; color: gray; text-align: center;">(จำลองหน้าตาแบบแอปพลิเคชัน)</p>
        </div>

        <div class="bottom-bar">
            <div style="font-size: 1.2rem; font-weight: bold; color: var(--dark);">รวม: 129฿</div>
            <button class="pixel-border btn-pixel" onclick="showLoader()">ยืนยันออเดอร์</button>
        </div>

        <div class="loader-overlay" id="loader">
            <div class="pixel-spinner"></div>
            <p style="margin-top: 20px; font-weight: bold; font-family: 'Silkscreen', sans-serif;">LOADING...</p>
        </div>
    </div>

    <script>
        function showLoader() {
            document.getElementById('loader').style.display = 'flex';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                alert('ส่งออเดอร์แล้ว! แคนดี้กำลังเดินทางไปหาคุณค่ะ 🍬');
            }, 2000);
        }
    </script>
</body>
</html>
