<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyMarket | ระบบเช่าเว็บไซต์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fff5f7; font-family: 'Kanit', sans-serif; overflow-x: hidden; color: #5a5a5a; }
        .grid-bg { background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px); background-size: 25px 25px; }
        .candy-text { background: linear-gradient(to right, #ff8da1, #8ec5fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .animate-rainbow { background: linear-gradient(to right, #ff2400, #e8b71d, #1de840, #1ddde8, #dd1de8, #ff2400); background-size: 400%; animation: move 3s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        @keyframes move { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .overlay { position: fixed; inset: 0; background: rgba(255, 182, 193, 0.4); backdrop-filter: blur(8px); z-index: 10005; display: none; align-items: center; justify-content: center; padding: 20px; }
        .pop-card { background: white; width: 100%; max-width: 350px; border-radius: 3rem; padding: 30px; border: 5px solid #fff; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); transform: scale(0.8); }
        .pop-card.show { transform: scale(1); }
        .auth-input { width: 100%; padding: 15px 20px; border-radius: 20px; border: 2px solid #fff0f3; margin-bottom: 12px; outline: none; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 18px; cursor: pointer; transition: 0.2s; }
        .menu-item:hover { background: #fff0f3; transform: translateX(5px); }
        .loader-full { position: fixed; inset: 0; background: #fff5f7; z-index: 99999; display: flex; justify-content: center; align-items: center; }
        .spin-icon { animation: fa-spin 2s infinite linear; color: #f07ab0; font-size: 50px; }
    </style>
</head>
<body class="grid-bg pb-20">

    <div id="loader" class="loader-full"><i class="fa-solid fa-cookie-bite spin-icon"></i></div>
    <div id="process-loader" class="overlay" style="z-index: 20002;"><i class="fa-solid fa-cookie-bite spin-icon"></i></div>

    <div id="candy-toast" class="fixed top-5 left-1/2 -translate-x-1/2 -translate-y-40 w-[90%] max-w-[350px] bg-white rounded-[25px] p-4 shadow-xl border-2 border-white z-[20001] transition-all duration-500 flex items-center gap-4">
        <div id="toast-icon-bg" class="w-12 h-12 rounded-xl flex items-center justify-center text-xl shrink-0"></div>
        <div><h4 id="toast-title" class="font-black text-sm"></h4><p id="toast-msg" class="text-xs text-gray-500"></p></div>
    </div>

    <header class="flex justify-between items-center px-6 py-4 sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-pink-100">
        <h1 class="text-2xl font-black candy-text">CandyMarket.</h1>
        <div id="auth-section"></div>
        <div id="user-panel" class="fixed top-20 right-5 w-72 bg-white rounded-[2.5rem] p-5 shadow-2xl border-4 border-white hidden z-[10000]">
            <div class="border-b pb-3 mb-3">
                <h4 id="menu-nickname" class="animate-rainbow text-lg font-black">Guest</h4>
                <p class="text-[9px] text-gray-300 font-bold uppercase">UID: <span id="menu-uid" class="text-pink-300">---</span></p>
            </div>
            <div class="bg-yellow-50 p-3 rounded-2xl mb-3 flex justify-between items-center border border-yellow-100">
                <div><p class="text-[9px] font-black text-yellow-500 uppercase">Balance</p><h4 class="text-xl font-black text-yellow-600">฿<span id="menu-balance">0</span></h4></div>
                <button onclick="toggleModal('topup-modal', true)" class="w-8 h-8 rounded-xl bg-yellow-400 text-white shadow-md">+</button>
            </div>
            <div onclick="toggleModal('profile-modal', true)" class="menu-item"><i class="fa-solid fa-user-gear text-pink-400"></i><span>จัดการโปรไฟล์</span></div>
            <div onclick="toggleModal('status-modal', true)" class="menu-item"><i class="fa-solid fa-desktop text-blue-400"></i><span>สถานะเว็บ</span></div>
            <button onclick="signOutUser()" class="w-full mt-3 text-[10px] font-black text-gray-400 hover:text-pink-400 uppercase tracking-widest">Logout</button>
        </div>
    </header>

    <main class="p-5">
        <div class="rounded-[3rem] bg-gradient-to-br from-blue-100 via-pink-100 to-pink-200 p-10 shadow-xl border-4 border-white mb-6">
            <h3 class="text-5xl font-black italic text-white drop-shadow-md">CANDY RENTAL</h3>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-10">
            <div class="bg-white p-5 rounded-[2.5rem] text-center border-2 border-pink-50">
                <p class="text-[9px] font-black text-pink-300 uppercase">Customers</p>
                <h4 class="text-3xl font-black text-pink-500" id="stat-users">0</h4>
            </div>
            <div class="bg-white p-5 rounded-[2.5rem] text-center border-2 border-blue-50">
                <p class="text-[9px] font-black text-blue-300 uppercase">Products</p>
                <h4 class="text-3xl font-black text-blue-500" id="stat-prods">0</h4>
            </div>
        </div>

        <h3 class="font-black text-gray-600 mb-6 px-2"><i class="fa-solid fa-gift text-pink-400"></i> รายการแนะนำ</h3>
        <div id="product-container" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="auth-modal" class="overlay"><div class="pop-card">
        <h2 id="auth-title" class="text-2xl font-black text-center mb-6 candy-text italic">SIGN IN</h2>
        <input type="text" id="user-input" class="auth-input" placeholder="Username">
        <input type="password" id="pass-input" class="auth-input" placeholder="Password">
        <button id="auth-btn" class="w-full py-4 bg-gradient-to-r from-pink-400 to-yellow-400 text-white rounded-2xl font-black shadow-lg">ยืนยัน</button>
        <p id="toggle-auth" class="text-center mt-4 text-xs text-pink-400 cursor-pointer">สลับโหมด สมัคร/เข้าสู่ระบบ</p>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const conf = { /* ...ใส่ Config เดิมของคุณ... */ };
        const app = initializeApp(conf); const auth = getAuth(app); const db = getDatabase(app);
        let userData = null;

        // UI Helpers
        const $ = id => document.getElementById(id);
        window.toggleModal = (id, show) => {
            const m = $(id); m.style.display = show ? 'flex' : 'none';
            setTimeout(() => m.querySelector('.pop-card').classList.toggle('show', show), 10);
            if(show) $('user-panel').classList.add('hidden');
        };

        window.showAlert = (title, msg, type = 'success') => {
            const t = $('candy-toast');
            $('toast-title').innerText = title; $('toast-msg').innerText = msg;
            $('toast-icon-bg').className = `w-12 h-12 rounded-xl flex items-center justify-center shrink-0 ${type === 'success' ? 'bg-green-100 text-green-500' : 'bg-red-100 text-red-500'}`;
            t.classList.remove('-translate-y-40'); setTimeout(() => t.classList.add('-translate-y-40'), 3000);
        };

        // Auth Logic
        let isLogin = true;
        $('toggle-auth').onclick = () => { isLogin = !isLogin; $('auth-title').innerText = isLogin ? "SIGN IN" : "REGISTER"; };
        $('auth-btn').onclick = async () => {
            const u = $('user-input').value, p = $('pass-input').value;
            $('process-loader').style.display = 'flex';
            try {
                const email = u.includes('@') ? u : `${u}@candymarket.com`;
                if(isLogin) await signInWithEmailAndPassword(auth, email, p);
                else {
                    const res = await createUserWithEmailAndPassword(auth, email, p);
                    await set(ref(db, `users/${res.user.uid}`), { username: u, balance: 0, uid: Date.now() });
                }
                toggleModal('auth-modal', false);
            } catch(e) { showAlert("Error", "ข้อมูลไม่ถูกต้อง", "error"); }
            $('process-loader').style.display = 'none';
        };

        onAuthStateChanged(auth, user => {
            if(user) {
                onValue(ref(db, `users/${user.uid}`), snap => {
                    userData = snap.val();
                    $('auth-section').innerHTML = `<button onclick="$('user-panel').classList.toggle('hidden')" class="w-12 h-12 rounded-full border-2 border-pink-200 bg-white text-pink-400 shadow-md flex items-center justify-center"><i class="fa-solid fa-cookie-bite"></i></button>`;
                    $('menu-nickname').innerText = userData.username;
                    $('menu-balance').innerText = userData.balance;
                });
            } else {
                $('auth-section').innerHTML = `<button onclick="toggleModal('auth-modal', true)" class="bg-pink-400 text-white px-6 py-2 rounded-full font-black shadow-lg">Sign In</button>`;
            }
        });

        // Load Products
        onValue(ref(db, 'products'), snap => {
            const cont = $('product-container'); cont.innerHTML = '';
            snap.forEach(c => {
                const p = c.val();
                cont.innerHTML += `
                <div class="bg-white rounded-[2.5rem] p-4 shadow-sm border-2 border-pink-50">
                    <img src="${p.image}" class="rounded-3xl mb-3 aspect-square object-cover">
                    <h4 class="font-black text-sm truncate">${p.name}</h4>
                    <p class="text-pink-500 font-black text-xl mb-3">฿${p.price}</p>
                    <button onclick="rent('${c.key}', ${p.price})" class="w-full py-2 bg-pink-50 text-pink-500 rounded-xl font-black text-[10px]">เช่าเว็บ</button>
                </div>`;
            });
        });

        window.signOutUser = () => signOut(auth).then(() => location.reload());
        window.onload = () => setTimeout(() => $('loader').style.display='none', 500);
    </script>
</body>
</html>
