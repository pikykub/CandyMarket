<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyMarket | ระบบเช่าเว็บไซต์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background:#fff5f7; font-family:'Kanit',sans-serif; color:#5a5a5a; }
        .grid-bg { background-image:radial-gradient(#ffcad4 1.5px,transparent 1.5px); background-size:25px 25px; }
        .candy-text { background:linear-gradient(to right,#ff8da1,#8ec5fc); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
        /* Modal & Loader Style */
        .modal { display:none; position:fixed; inset:0; background:rgba(255,192,203,0.4); backdrop-filter:blur(4px); z-index:1000; align-items:center; justify-content:center; }
        .modal-content { background:white; padding:2rem; border-radius:2.5rem; width:90%; max-width:350px; border:4px solid #ffe4e9; text-align:center; }
        #loader { position:fixed; inset:0; background:#fff5f7; z-index:9999; display:flex; justify-content:center; align-items:center; transition:opacity .5s; }
    </style>
</head>
<body class="grid-bg pb-20">

    <div id="loader">
        <i class="fa-solid fa-cookie-bite text-5xl text-[#f07ab0] animate-bounce"></i>
    </div>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <h3 class="text-2xl font-black candy-text mb-4">Login</h3>
            <input type="text" id="login-user" class="w-full p-3 mb-2 rounded-full border-2 border-pink-50" placeholder="ชื่อผู้ใช้">
            <input type="password" id="login-pass" class="w-full p-3 mb-4 rounded-full border-2 border-pink-50" placeholder="รหัสผ่าน">
            <button id="btn-do-login" class="w-full bg-pink-400 text-white py-3 rounded-full font-black">เข้าสู่ระบบ</button>
            <button onclick="closeModal('login-modal')" class="mt-4 text-gray-400 text-sm">ปิด</button>
        </div>
    </div>

    <header class="flex justify-between items-center px-6 py-4 sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-pink-100">
        <h1 class="text-2xl font-black candy-text">CandyMarket.</h1>
        <div id="auth-section"></div>
    </header>

    <div class="mx-5 mt-6 mb-8">
        <div class="relative rounded-[3rem] bg-gradient-to-br from-[#bfe9ff] via-[#ffcaf2] to-[#ffbdc7] p-8 text-white shadow-xl">
            <p class="text-sm font-bold flex items-center gap-2"><i class="fa-solid fa-asterisk"></i> บริการปล่อยเช่าเว็บ</p>
            <h3 class="text-5xl font-black italic mt-1">CANDY RENTAL</h3>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 px-5 mb-10">
        <div class="bg-white p-5 rounded-[2rem] border-2 border-pink-50 text-center">
            <p class="text-pink-300 text-[10px] font-black uppercase">ลูกค้าที่น่ารัก</p>
            <h4 class="text-3xl font-black text-[#f07ab0]" id="stat-users">0</h4>
        </div>
        <div class="bg-white p-5 rounded-[2rem] border-2 border-blue-50 text-center">
            <p class="text-blue-300 text-[10px] font-black uppercase">ขนมในร้าน</p>
            <h4 class="text-3xl font-black text-[#7db9f9]" id="stat-prods">0</h4>
        </div>
    </div>

    <div class="px-5">
        <h3 class="text-lg font-black text-gray-600 mb-5 flex items-center gap-2">
            <i class="fa-solid fa-gift text-pink-400"></i> รายการแนะนำ
        </h3>
        <div class="grid grid-cols-2 gap-4" id="product-container"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
