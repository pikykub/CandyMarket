<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peachweb-store | ระบบเช่าเว็บไซต์</title>
    
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style type="text/tailwindcss">
        /* ใส่ Style เพิ่มเติมตรงนี้เพื่อให้ Tailwind อ่านค่าได้แม่นยำขึ้น */
        @theme {
          --color-pink-candy: #f07ab0;
          --color-blue-candy: #7db9f9;
        }
        
        body { @apply bg-[#fff5f7] text-[#5a5a5a] overflow-x-hidden; font-family: 'Kanit', sans-serif; }
        .grid-bg { background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px); background-size: 25px 25px; }
        .candy-text { background: linear-gradient(to right, #ff8da1, #8ec5fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* สไตล์ Modal แบบไม่มีช็อกโกแลต */
        .contact-overlay { @apply fixed inset-0 bg-pink-200/40 backdrop-blur-md z-[9999] hidden items-center justify-center p-5; }
        .contact-card { @apply bg-white w-full max-w-[350px] rounded-[3rem] p-8 border-4 border-white shadow-2xl scale-75 transition-transform duration-300; }
        .contact-card.show { @apply scale-100; }
    </style>
</head>
<body class="grid-bg pb-20">
    <div id="loader" class="fixed inset-0 bg-[#fff5f7] z-[99999] flex justify-center items-center transition-opacity duration-500">
        <div class="text-6xl text-[#f07ab0] animate-spin"><i class="fa-solid fa-cookie-bite"></i></div>
    </div>

    <header class="flex justify-between items-center px-6 py-4 sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-pink-100">
        <h1 class="text-2xl font-black candy-text">Peachweb-store.</h1>
        <div id="auth-section">
             <button onclick="openAuth()" class="bg-gradient-to-r from-[#f07ab0] to-[#ffb347] text-white px-6 py-2 rounded-full text-xs font-black shadow-md">เข้าสู่ระบบ</button>
        </div>
    </header>

    <div class="mx-5 mt-6 mb-4">
        <div class="relative rounded-[3rem] overflow-hidden bg-gradient-to-br from-[#bfe9ff] via-[#ffcaf2] to-[#ffbdc7] p-8 min-h-[180px] flex flex-col justify-center shadow-xl border-4 border-white">
            <h3 class="text-4xl font-black italic tracking-tighter text-white drop-shadow-lg leading-none">PEACH<br>RENTAL</h3>
            <p class="text-[10px] text-white/90 mt-2 font-medium uppercase">Brightest Web Rental in the World!</p>
        </div>
    </div>

    <div class="grid grid-cols-2 gap-4 px-5 mb-10">
        <button onclick="openContact()" class="bg-white rounded-[40px] p-4 flex items-center justify-between shadow-lg border-2 border-white">
            <div class="text-[#7db9f9] text-left">
                <p class="text-[9px] font-black">แจ้งปัญหา</p>
                <h5 class="text-xl font-black italic">CHAT</h5>
            </div>
            <div class="w-10 h-10 rounded-full bg-[#7db9f9] text-white flex items-center justify-center shadow-md"><i class="fa-solid fa-comment-dots"></i></div>
        </button>
        <button class="bg-white rounded-[40px] p-4 flex items-center justify-between shadow-lg border-2 border-white">
            <div class="text-[#f07ab0] text-left">
                <p class="text-[9px] font-black">วิธีสั่งซื้อ</p>
                <h5 class="text-xl font-black italic">GUIDE</h5>
            </div>
            <div class="w-10 h-10 rounded-full bg-[#f07ab0] text-white flex items-center justify-center shadow-md"><i class="fa-solid fa-star"></i></div>
        </button>
    </div>

    <script>
        // ฟังก์ชันเปิดปิด Modal แบบง่ายๆ
        window.openContact = () => {
            const modal = document.getElementById('contact-modal');
            modal.style.display = 'flex';
            setTimeout(() => modal.querySelector('.contact-card').classList.add('show'), 10);
        };
        window.closeContact = () => {
            const modal = document.getElementById('contact-modal');
            modal.querySelector('.contact-card').classList.remove('show');
            setTimeout(() => modal.style.display = 'none', 300);
        };
        window.onload = () => {
            setTimeout(() => {
                const loader = document.getElementById('loader');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 800);
        };
    </script>
</body>
</html>
