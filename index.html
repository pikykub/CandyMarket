<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CandyMarket - Premium Dress-Up</title>
    <style>
        :root { --pink: #ffb6c1; --soft: #fffafa; --accent: #ff8da1; }
        body { background: var(--soft); font-family: 'Segoe UI', Tahoma, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        
        .game-wrapper { display: flex; gap: 20px; background: white; padding: 25px; border-radius: 35px; border: 8px solid var(--pink); width: 95vw; max-width: 1100px; height: 85vh; box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4); }
        
        /* ฝั่งตัวละคร - จัดให้ตรงกลางและสมส่วน */
        .stage { position: relative; width: 400px; height: 100%; background: #ffffff; border-radius: 25px; border: 3px solid var(--pink); display: flex; justify-content: center; align-items: flex-end; overflow: hidden; }
        .layer { position: absolute; width: 100%; height: auto; bottom: 0; pointer-events: none; transition: 0.3s ease; }
        
        /* ลำดับเลเยอร์ (สำคัญมากไม่ให้ซ้อนมั่ว) */
        .l-base   { z-index: 1; } /* ตัวเปล่า */
        .l-eyes   { z-index: 2; } /* ตา */
        .l-socks  { z-index: 3; } /* ถุงเท้า */
        .l-bottom { z-index: 4; } /* กระโปรง/กางเกง */
        .l-top    { z-index: 5; } /* เสื้อ */
        .l-outfit { z-index: 6; } /* เดรส (จะปิดเลเยอร์ 4-5 เมื่อใส่) */
        .l-hair   { z-index: 7; } /* ทรงผม */
        .l-acc    { z-index: 8; } /* หูฟัง/เครื่องประดับ */

        /* ฝั่งเมนู */
        .menu { flex: 1; overflow-y: auto; padding: 10px; }
        .cat-title { background: var(--accent); color: white; padding: 12px; border-radius: 15px; font-weight: bold; margin: 15px 0; font-size: 14px; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        
        .item-card { 
            background: #fff; border: 2px solid #eee; border-radius: 20px; padding: 10px; cursor: pointer;
            text-align: center; transition: 0.2s;
        }
        .item-card:hover { border-color: var(--pink); transform: scale(1.05); }
        .item-card img { width: 70px; height: 70px; object-fit: contain; }
        .item-card span { display: block; font-size: 11px; color: #999; margin-top: 5px; }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 10px; }
    </style>
</head>
<body>

<div class="game-wrapper">
    <div class="stage">
        <!-- ตัวละครเบสจากรูปที่คุณต้องการ -->
        <img id="body" class="layer l-base" src="https://api.iconify.design/fluent-emoji-flat:person-light.svg?width=500">
        <img id="socks" class="layer l-socks">
        <img id="bottom" class="layer l-bottom">
        <img id="top" class="layer l-top">
        <img id="outfit" class="layer l-outfit">
        <img id="hair" class="layer l-hair">
        <img id="acc" class="layer l-acc">
    </div>

    <div class="menu" id="items-list">
        <!-- หมวดหมู่จะถูกโหลดที่นี่ -->
    </div>
</div>

<script>
    // ข้อมูลชุดที่เน้น "ความต่างของรูปทรง" จริงๆ
    const inventory = [
        { id: "hair", name: "💇 ทรงผมแฟชั่น", icons: ["noto:woman-curly-hair", "noto:woman-blonde-hair", "noto:woman-red-hair", "noto:person-with-skullcap", "noto:man-curly-hair", "noto:woman-white-hair"] },
        { id: "top", name: "👕 เสื้อหลากสไตล์", icons: ["noto:t-shirt", "noto:coat", "noto:necktie", "noto:running-shirt", "noto:lab-coat", "noto:safety-vest"] },
        { id: "outfit", name: "👗 เดรส & ชุดเซ็ต", icons: ["noto:dress", "noto:kimono", "noto:sari", "noto:martial-arts-uniform", "noto:safety-vest"] },
        { id: "acc", name: "🎧 หูฟัง & พรีเมียม", icons: ["noto:headphones", "noto:crown", "noto:ribbon", "noto:glasses", "noto:earrings"] }
    ];

    function initGame() {
        const menuContainer = document.getElementById('items-list');
        
        inventory.forEach(cat => {
            const title = document.createElement('div');
            title.className = 'cat-title';
            title.innerText = cat.name;
            menuContainer.appendChild(title);
            
            const grid = document.createElement('div');
            grid.className = 'grid';
            
            // สร้างไอเทม 100 ชิ้นแบบไม่ซ้ำ
            for (let i = 0; i < 100; i++) {
                const card = document.createElement('div');
                card.className = 'item-card';
                
                // สลับไอคอนและสี (Hue) เพื่อให้ได้ 100 แบบที่ไม่ซ้ำซาก
                const iconBase = cat.icons[i % cat.icons.length];
                const hueValue = (i * 35) % 360; 
                const imgSource = `https://api.iconify.design/${iconBase}.svg`;
                
                card.innerHTML = `
                    <img src="${imgSource}" style="filter: hue-rotate(${hueValue}deg)">
                    <span>สไตล์ที่ ${i+1}</span>
                `;
                
                card.onclick = () => {
                    const target = document.getElementById(cat.id);
                    target.src = imgSource;
                    target.style.filter = `hue-rotate(${hueValue}deg)`;
                    
                    // ระบบป้องกันการซ้อน: ถ้าใส่เดรส ให้ซ่อนเสื้อและกางเกง
                    if(cat.id === 'outfit') {
                        document.getElementById('top').src = "";
                        document.getElementById('bottom').src = "";
                    } else if (cat.id === 'top' || cat.id === 'bottom') {
                        document.getElementById('outfit').src = "";
                    }
                };
                grid.appendChild(card);
            }
            menuContainer.appendChild(grid);
        });
    }

    initGame();
</script>

</body>
</html>
