<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyMarket | ระบบเช่าเว็บไซต์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fff5f7; font-family: 'Kanit', sans-serif; color: #5a5a5a; overflow-x: hidden; }
        .grid-bg { background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px); background-size: 25px 25px; }
        .candy-text { background: linear-gradient(to right, #ff8da1, #8ec5fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        /* ✨ Animated Name & Rainbow */
        @keyframes rainbowMove { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .admin-rainbow-text {
            background: linear-gradient(to right, #ff2400, #e81d1d, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400);
            background-size: 400% 400%;
            animation: rainbowMove 3s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900 !important;
            filter: drop-shadow(0 0 5px rgba(255,192,203,0.3));
        }

        /* 👑 Owner Badge */
        @keyframes badgeBounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-3px) scale(1.05); } }
        .owner-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: linear-gradient(45deg, #ff9a9e 0%, #fecfef 99%);
            color: #ff4d6d; padding: 2px 10px; border-radius: 50px;
            font-size: 10px; font-weight: 900; border: 2px solid #fff;
            box-shadow: 0 4px 10px rgba(255, 77, 109, 0.2);
            animation: badgeBounce 2s ease-in-out infinite;
        }

        /* UI Helpers */
        .auth-overlay { position: fixed; inset: 0; background: rgba(255, 182, 193, 0.4); backdrop-filter: blur(8px); z-index: 10005; display: none; align-items: center; justify-content: center; padding: 20px; }
        .pop-card { background: white; width: 100%; max-width: 350px; border-radius: 3rem; padding: 30px; border: 5px solid #fff; box-shadow: 0 20px 40px rgba(240, 122, 176, 0.2); transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pop-card.show { transform: scale(1); }
        .auth-input { width: 100%; padding: 15px 20px; border-radius: 20px; border: 2px solid #fff0f3; background: #fffafa; margin-bottom: 15px; outline: none; }
        .control-panel { position: absolute; top: 75px; right: 20px; width: 280px; background: white; border-radius: 2.5rem; padding: 20px; box-shadow: 0 15px 35px rgba(240, 122, 176, 0.2); border: 4px solid #fff; display: none; z-index: 10000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 18px; cursor: pointer; transition: 0.2s; color: #666; font-weight: 500; }
        .menu-item:hover { background: #fff0f3; transform: translateX(5px); }
        #loader, #process-loader { position: fixed; inset: 0; background: #fff5f7; z-index: 99999; display: flex; justify-content: center; align-items: center; }
        #process-loader { background: rgba(255, 255, 255, 0.7); z-index: 20000; display: none; }
        .cookie-spin { font-size: 60px; color: #f07ab0; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</head>
<body class="grid-bg pb-20">

    <div id="loader"><i class="fa-solid fa-cookie-bite cookie-spin"></i></div>
    <div id="process-loader"><i class="fa-solid fa-cookie-bite cookie-spin"></i></div>

    <header class="flex justify-between items-center px-6 py-4 sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-pink-100">
        <h1 class="text-2xl font-black candy-text">CandyMarket.</h1>
        <div id="auth-section"></div>

        <div id="user-panel" class="control-panel">
            <div class="px-2 py-3 border-b border-pink-50 mb-2">
                <div class="flex items-center gap-2">
                    <img id="menu-avatar" src="" class="w-10 h-10 rounded-full border-2 border-pink-100 object-cover hidden">
                    <div id="menu-avatar-temp" class="w-10 h-10 rounded-full bg-pink-100 text-pink-400 flex items-center justify-center"><i class="fa-solid fa-cookie text-xl"></i></div>
                    <div>
                        <h4 id="menu-nickname" class="text-lg leading-tight font-black">Guest</h4>
                        <div id="menu-badge" class="mt-0.5 text-[9px] font-black px-2 py-0.5 rounded-full bg-pink-50 text-pink-400 border border-pink-100 uppercase">MEMBER</div>
                    </div>
                </div>
                <p class="text-[9px] text-gray-300 font-bold mt-2 uppercase">UID: <span id="menu-uid" class="text-pink-300">--------</span></p>
            </div>
            <div onclick="openProfile()" class="menu-item"><i class="fa-solid fa-user-gear text-pink-400"></i><span>จัดการโปรไฟล์</span></div>
            <button onclick="handleLogout()" class="w-full mt-3 py-2 text-[10px] font-black text-gray-400 uppercase tracking-widest hover:text-pink-400">Logout</button>
        </div>
    </header>

    <div id="profile-modal" class="auth-overlay">
        <div class="pop-card">
            <h2 class="text-2xl font-black text-center mb-6 candy-text italic uppercase">My Profile</h2>
            <div class="flex flex-col items-center mb-6">
                <div class="relative">
                    <img id="profile-img-view" src="https://i.pinimg.com/736x/8b/11/d8/8b11d886f68c3746c87f607c3c2e6f4a.jpg" class="w-24 h-24 rounded-[2.5rem] border-4 border-white shadow-lg object-cover bg-pink-50">
                    <label for="img-upload" class="absolute bottom-0 right-0 w-8 h-8 bg-[#f07ab0] text-white rounded-full flex items-center justify-center cursor-pointer shadow-md border-2 border-white"><i class="fa-solid fa-camera text-[10px]"></i></label>
                    <input type="file" id="img-upload" class="hidden" accept="image/*">
                </div>
            </div>
            <input type="text" id="edit-nickname" class="auth-input" placeholder="Nickname (ชื่อเล่น)...">
            <button id="save-profile" class="bg-gradient-to-r from-[#f07ab0] to-[#ffb347] text-white w-full py-4 rounded-2xl font-black shadow-lg">บันทึกการเปลี่ยนแปลง</button>
            <button onclick="closeModal('profile-modal')" class="block mx-auto mt-6 text-gray-300 text-[10px] font-black uppercase">Maybe Later</button>
        </div>
    </div>

    <div id="auth-modal" class="auth-overlay">
        <div class="pop-card">
            <h2 id="auth-title" class="text-3xl font-black text-center mb-8 candy-text uppercase">Sign In</h2>
            <input type="text" id="user-input" class="auth-input" placeholder="Username...">
            <input type="password" id="pass-input" class="auth-input" placeholder="Password...">
            <button id="auth-btn" class="bg-gradient-to-r from-[#f07ab0] to-[#ffb347] text-white w-full py-4 rounded-2xl font-black shadow-lg">ยืนยัน</button>
            <p id="toggle-auth" class="text-center mt-5 text-sm text-pink-400 font-bold cursor-pointer underline">สมัครสมาชิกที่นี่</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";
        
        const firebaseConfig = {
            apiKey: "AIzaSyBJEO4o365sI4XFZD4IRIaDjetIMNtCMwU",
            authDomain: "candy-market-system.firebaseapp.com",
            databaseURL: "https://candy-market-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "candy-market-system",
            storageBucket: "candy-market-system.firebasestorage.app",
            messagingSenderId: "955686244672",
            appId: "1:955686244672:web:484fdc3d7192d3074c2aa5"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);
        const IMGBB_API_KEY = "80a545f5d148fe3f87841ab333c6ea6a"; // ✨ ใส่ให้แล้วจ้า!

        // UI Logic
        window.openModal = (id) => { 
            const el = document.getElementById(id); el.style.display = 'flex';
            setTimeout(() => el.querySelector('.pop-card').classList.add('show'), 10);
        };
        window.closeModal = (id) => { 
            const el = document.getElementById(id); el.querySelector('.pop-card').classList.remove('show');
            setTimeout(() => el.style.display = 'none', 300);
        };
        window.togglePanel = () => { const p = document.getElementById('user-panel'); p.style.display = p.style.display === 'block' ? 'none' : 'block'; };
        window.openProfile = () => { document.getElementById('user-panel').style.display = 'none'; openModal('profile-modal'); };
        window.handleLogout = () => signOut(auth).then(() => location.reload());

        // ✨ อัปโหลดรูปไป ImgBB
        document.getElementById('img-upload').onchange = function(e) {
            if (this.files && this.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => document.getElementById('profile-img-view').src = e.target.result;
                reader.readAsDataURL(this.files[0]);
            }
        };

        document.getElementById('save-profile').onclick = async () => {
            const nick = document.getElementById('edit-nickname').value.trim();
            const imgData = document.getElementById('profile-img-view').src;
            document.getElementById('process-loader').style.display = 'flex';
            
            try {
                let profilePicUrl = "";
                if (imgData.startsWith('data:image')) {
                    const formData = new FormData();
                    formData.append("image", imgData.split(',')[1]);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: "POST", body: formData });
                    const result = await res.json();
                    if (result.success) profilePicUrl = result.data.url;
                }

                const updates = { nickname: nick };
                if (profilePicUrl) updates.profilePic = profilePicUrl;
                await update(ref(db, `users/${auth.currentUser.uid}`), updates);
                alert("อัปเดตโปรไฟล์สำเร็จแล้วค่ะ!");
                closeModal('profile-modal');
            } catch (e) { alert("เกิดข้อผิดพลาด: " + e.message); }
            finally { document.getElementById('process-loader').style.display = 'none'; }
        };

        // Auth Logic
        let isLogin = true;
        document.getElementById('toggle-auth').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Sign In" : "Register";
            document.getElementById('toggle-auth').innerText = isLogin ? "สมัครสมาชิกที่นี่" : "มีบัญชีแล้ว? เข้าสู่ระบบ";
        };

        document.getElementById('auth-btn').onclick = async () => {
            const user = document.getElementById('user-input').value.trim();
            const pass = document.getElementById('pass-input').value.trim();
            const email = user === "AdminPeach" ? "feirnbiddu10@gmail.com" : `${user}@candymarket.com`;
            
            try {
                if(isLogin) {
                    await signInWithEmailAndPassword(auth, email, pass);
                } else {
                    const res = await createUserWithEmailAndPassword(auth, email, pass);
                    await set(ref(db, `users/${res.user.uid}`), { 
                        username: user, 
                        uid: Math.floor(Math.random() * 90000000) + 10000000,
                        level: user === "AdminPeach" ? "Admin" : "Member"
                    });
                }
                closeModal('auth-modal');
            } catch (e) { alert("ข้อมูลไม่ถูกต้องค่ะ"); }
        };

        // State Tracking (ยศ & ชื่อเรนโบว์)
        onAuthStateChanged(auth, (user) => {
            const section = document.getElementById('auth-section');
            if(user) {
                onValue(ref(db, `users/${user.uid}`), (snap) => {
                    const data = snap.val() || {};
                    const nameEl = document.getElementById('menu-nickname');
                    const badgeEl = document.getElementById('menu-badge');
                    
                    if (data.username === "AdminPeach" || data.level === "Admin") {
                        nameEl.innerText = "Admin Peach";
                        nameEl.className = "admin-rainbow-text text-xl leading-tight";
                        badgeEl.className = "owner-badge mt-0.5";
                        badgeEl.innerHTML = `<i class="fa-solid fa-crown"></i> OWNER`;
                    } else {
                        nameEl.innerText = data.nickname || data.username || "Guest";
                        nameEl.className = "text-lg font-black";
                        badgeEl.className = "text-[9px] font-black px-2 py-0.5 rounded-full bg-pink-50 text-pink-400 border border-pink-100 uppercase";
                        badgeEl.innerHTML = "MEMBER";
                    }

                    document.getElementById('menu-uid').innerText = data.uid || "--------";
                    if(data.profilePic) {
                        document.getElementById('menu-avatar').src = data.profilePic;
                        document.getElementById('menu-avatar').classList.remove('hidden');
                        document.getElementById('menu-avatar-temp').classList.add('hidden');
                        document.getElementById('profile-img-view').src = data.profilePic;
                    }
                });
                section.innerHTML = `<button onclick="togglePanel()" class="w-12 h-12 rounded-full bg-white border-2 border-pink-200 text-pink-400 flex items-center justify-center shadow-md"><i class="fa-solid fa-cookie text-2xl"></i></button>`;
            } else {
                section.innerHTML = `<button onclick="openModal('auth-modal')" class="bg-gradient-to-r from-[#f07ab0] to-[#ffb347] text-white px-7 py-2.5 rounded-full text-xs font-black shadow-lg">Sign In</button>`;
            }
        });

        window.onload = () => setTimeout(() => document.getElementById('loader').style.display='none', 600);
    </script>
</body>
</html>
