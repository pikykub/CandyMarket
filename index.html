<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EK ChaoLoey - เว็บเช่าคุณภาพ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #f0f7ff; }
        .main-container { background: #f8fbff; border-radius: 3.5rem; border: 12px solid white; box-shadow: 0 20px 50px rgba(186, 215, 255, 0.5); }
        .glass-card { background: white; border-radius: 2.5rem; border: 2px solid #eef6ff; box-shadow: 0 8px 20px rgba(0, 71, 171, 0.05); transition: all 0.3s; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0, 71, 171, 0.1); }
        .eko-glow { filter: drop-shadow(0 0 15px rgba(96, 165, 250, 0.4)); }
        .nav-active { background: #dbeafe; border-radius: 1.5rem; padding: 0.5rem 1rem; color: #1e40af; }
    </style>
</head>
<body class="p-4 md:p-10 flex justify-center items-start min-h-screen">

    <!-- Container หลักที่โค้งมนและมีขอบขาวหนา -->
    <div class="max-w-md w-full main-container p-8 space-y-8 relative overflow-hidden">
        
        <!-- Header Section -->
        <header class="flex justify-between items-start pt-2">
            <div class="space-y-0">
                <div class="flex items-center gap-2 mb-1">
                    <div class="w-12 h-12 bg-blue-600 rounded-2xl flex items-center justify-center text-white font-black text-xl shadow-lg shadow-blue-200">EK</div>
                    <h1 class="text-2xl font-black text-blue-900 leading-none">EK CHAO<br>LOEY</h1>
                </div>
            </div>
            <nav class="flex gap-3 text-[10px] font-extrabold text-blue-800 items-center uppercase">
                <span class="nav-active">หน้าแรก</span>
                <span>ผลงาน</span>
                <span>ติดต่อเรา</span>
            </nav>
        </header>

        <!-- Hero: น้องเอโกะ Mascot แบบเป๊ะๆ -->
        <section class="text-center py-4">
            <div class="relative w-48 h-48 mx-auto mb-6">
                <!-- วงกลมล้อมรอบน้องเอโกะ -->
                <div class="absolute inset-0 border-4 border-blue-400 rounded-full opacity-60"></div>
                <!-- ตัวน้องเอโกะ SVG -->
                <div class="absolute inset-0 flex items-center justify-center">
                    <svg viewBox="0 0 100 100" class="w-32 h-32 eko-glow">
                        <!-- หน้า -->
                        <circle cx="50" cy="55" r="35" fill="#dbeafe" />
                        <!-- หู/เสาอากาศ -->
                        <path d="M 35 25 Q 35 15 42 22" stroke="#60a5fa" stroke-width="6" fill="none" stroke-linecap="round" />
                        <path d="M 65 25 Q 65 15 58 22" stroke="#60a5fa" stroke-width="6" fill="none" stroke-linecap="round" />
                        <!-- ตา -->
                        <circle cx="40" cy="50" r="4" fill="#1e3a8a" />
                        <circle cx="60" cy="50" r="4" fill="#1e3a8a" />
                        <!-- ปากยิ้ม -->
                        <path d="M 38 65 Q 50 75 62 65" stroke="#1e3a8a" stroke-width="4" fill="none" stroke-linecap="round" />
                    </svg>
                </div>
            </div>
            <h2 class="text-3xl font-black text-blue-900 mb-1">Welcome to my shop</h2>
            <p class="text-blue-400 text-sm font-bold tracking-tight">บริการเว็บไซต์น่ารักๆ สไตล์ Modern Clean</p>
        </section>

        <!-- Service Cards (3 Columns) -->
        <div class="grid grid-cols-3 gap-3">
            <div class="glass-card p-4 flex flex-col items-center gap-3">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500">
                    <i data-lucide="monitor" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-black text-blue-900 text-center leading-tight">เว็บ<br>ครบวงจร</span>
            </div>
            <div class="glass-card p-4 flex flex-col items-center gap-3 border-blue-200 bg-blue-600">
                <div class="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-white">
                    <i data-lucide="gem" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-black text-white text-center leading-tight">เว็บ<br>เรทราคา</span>
            </div>
            <div class="glass-card p-4 flex flex-col items-center gap-3">
                <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-500">
                    <i data-lucide="user" class="w-6 h-6"></i>
                </div>
                <span class="text-[10px] font-black text-blue-900 text-center leading-tight">เว็บไบโอ<br>(Bio)</span>
            </div>
        </div>

        <!-- Progress Tracking -->
        <div class="glass-card p-6 border-dashed border-2 border-blue-100">
            <div class="flex justify-between items-center mb-3">
                <span class="text-xs font-black text-blue-900 uppercase tracking-widest italic">Status: กำลังลงโค้ด</span>
                <span class="text-xs font-black text-blue-600">75%</span>
            </div>
            <div class="w-full bg-blue-50 h-6 rounded-full p-1 shadow-inner">
                <div class="bg-gradient-to-r from-blue-400 to-blue-600 h-full rounded-full w-[75%] relative shadow-md">
                    <div class="absolute right-0 top-0 w-2 h-full bg-white/20"></div>
                </div>
            </div>
        </div>

        <!-- Footer Call to Action -->
        <div class="space-y-4">
            <button class="w-full bg-blue-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-xl shadow-blue-200 hover:scale-[1.03] transition-all flex items-center justify-center gap-3 uppercase tracking-tighter">
                <i data-lucide="zap" class="w-6 h-6 fill-white"></i> กดสั่งทำเลย
            </button>
            <p class="text-center text-[9px] font-bold text-blue-300 uppercase tracking-widest">Powered by EK ChaoLoey Team</p>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>
</html>
