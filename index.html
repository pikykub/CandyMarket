<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candy Market</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Quicksand',sans-serif;
}

body{

background:
radial-gradient(#ffd4e8 1.5px, transparent 1.5px);

background-size:28px 28px;
background-color:#fff7fb;

}

/* NAVBAR */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;

padding:16px 30px;

background:white;

box-shadow:0 5px 15px rgba(0,0,0,0.05);

}

.logo{

font-family:'Mali';
font-size:24px;
color:#ff6fae;

}

.nav-right{

display:flex;
align-items:center;
gap:15px;

}

.login-btn{

padding:8px 16px;
border-radius:20px;
background:#ff6fae;
color:white;
text-decoration:none;
font-size:14px;

}

/* avatar */

.avatar{

width:36px;
height:36px;
border-radius:50%;
border:2px solid #ffd4e8;
object-fit:cover;
cursor:pointer;

}

/* hero */

.hero{

padding:80px 20px;
text-align:center;

}

.hero h1{

font-family:'Mali';
font-size:36px;
color:#ff6fae;

}

.hero p{

margin-top:10px;
color:#666;

}

/* mobile */

@media(max-width:500px){

.hero h1{

font-size:28px;

}

}

</style>
</head>

<body>

<div class="navbar">

<div class="logo">Candy Market</div>

<div class="nav-right" id="nav-user"></div>

</div>


<div class="hero">

<h1>เว็บปล่อยเช่าเว็บสำเร็จรูป</h1>

<p>เลือกเว็บที่คุณชอบ แล้วเริ่มใช้งานได้ทันที</p>

</div>


<script>

/* candy icons (ไม่ใช่สติ๊กเกอร์) */

const candyIcons=[

"https://api.iconify.design/mdi/candy-outline.svg",

"https://api.iconify.design/mdi/lollipop.svg",

"https://api.iconify.design/mdi/candycane.svg"

]


let logged=localStorage.getItem("loggedIn")

let user=JSON.parse(localStorage.getItem("user"))

const nav=document.getElementById("nav-user")


if(logged && user){

/* ถ้ายังไม่มี avatar */

if(!user.avatar){

user.avatar=candyIcons[Math.floor(Math.random()*candyIcons.length)]

localStorage.setItem("user",JSON.stringify(user))

}

nav.innerHTML=`

<a href="profile.html">

<img src="${user.avatar}" class="avatar">

</a>

`

}else{

nav.innerHTML=`

<a href="login.html" class="login-btn">

เข้าสู่ระบบ

</a>

`

}

</script>


</body>
</html>
