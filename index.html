<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Rent - Cutie Version</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        /* CSS เดิมที่ปรับปรุงเรื่องเส้นขอบและสี */
        :root {
            --pixel-blue: #a3d8f4; /* ฟ้าพาสเทลนุ่มขึ้น */
            --pixel-pink: #fbc6f5; /* ชมพูพาสเทลหวานขึ้น */
            --dark-grey: #4a4a4a;
            --white: #ffffff;
            --border-style: 3px dotted #4a4a4a; /* เส้นขอบจุด */
        }

        body {
            background-color: #fdf2f8; /* พื้นหลังชมพูอ่อนมากๆ */
            font-family: 'Press Start 2P', cursive;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        /* Container หลัก */
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        /* หัวข้อเว็บ */
        .header {
            text-align: center;
            padding: 40px;
            background: var(--pixel-blue);
            border: var(--border-style);
            border-radius: 15px; /* มุมโค้ง */
            box-shadow: 5px 5px 0px var(--pixel-pink);
            margin-bottom: 40px;
            position: relative;
        }

        /* ไอคอนหัวใจดุ๊กดิ๊ก */
        .heart-icon {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            animation: wiggle 2s linear infinite; /* แอนิเมชัน */
        }

        /* ปรับเลย์เอาต์เป็น 2 คอลัมน์ (CSS Grid) */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); /* ปรับขนาดขั้นต่ำ */
            gap: 25px;
        }

        /* การ์ดสินค้า */
        .pixel-card {
            background: var(--white);
            border: var(--border-style);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 4px 4px 0px #000;
        }

        /* เมื่อเอาเมาส์ชี้ การ์ดจะขยับ */
        .pixel-card:hover {
            transform: translate(-3px, -3px) rotate(1deg); /* ขยับและหมุนนิดหน่อย */
            box-shadow: 6px 6px 0px var(--pixel-pink);
        }

        .pixel-card h3 {
            font-size: 16px;
            color: var(--dark-grey);
            margin-top: 0;
        }

        .price {
            color: #ff66b2;
            margin: 20px 0;
            font-size: 14px;
            font-weight: bold;
        }

        /* ไอคอนในแบนเนอร์ (ทำให้ดุ๊กดิ๊กได้) */
        .banner-icon {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 50px;
            height: 50px;
            /* แทนที่ด้วยรูป .png จริงๆ ของคุณ */
            background-color: #ccc; 
            border: 2px solid #000;
            border-radius: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            animation: wiggle 1.5s ease-in-out infinite;
        }

        /* ปุ่มพิกเซลดุ๊กดิ๊ก */
        .pixel-btn {
            display: inline-block;
            padding: 12px 20px;
            background: var(--pixel-pink);
            border: var(--border-style);
            border-radius: 10px;
            text-decoration: none;
            color: #000;
            font-size: 12px;
            cursor: pointer;
            box-shadow: 3px 3px 0px #000;
            transition: background 0.2s, transform 0.1s;
        }

        .pixel-btn:hover {
            background: #f8a8e8; /* ชมพูเข้มขึ้นเล็กน้อย */
            transform: scale(1.05); /* ขยายใหญ่ขึ้น */
        }

        .pixel-btn:active {
            box-shadow: 0px 0px 0px #000;
            transform: translate(3px, 3px);
        }

        /* ----- CSS Animations ----- */

        /* แอนิเมชันดุ๊กดิ๊ก (Wiggle) */
        @keyframes wiggle {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(-3deg); }
            50% { transform: rotate(3deg); }
            75% { transform: rotate(-2deg); }
            100% { transform: rotate(0deg); }
        }

        /* สำหรับปรับปรุงตามขนาดหน้าจอ (Responsive) */
        @media (max-width: 600px) {
            .grid {
                grid-template-columns: 1fr; /* หน้าจอมือถือเรียงกันลงมาเหมือนเดิม */
            }
        }

    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <span class="heart-icon">💖</span>
        <h1>PIXEL RENT</h1>
        <p style="font-size: 12px; margin-top: 10px; color: var(--dark-grey);">เว็บเช่าระบบ ธีมฟ้า-ชมพู (Cutie Edition)</p>
    </div>

    <div class="grid">
        <div class="pixel-card">
            <h3>Standard Shop</h3>
            <p style="font-size: 10px; color: #777;">เหมาะสำหรับเริ่มต้น</p>
            <div class="price">150 THB / Month</div>
            <a href="#" class="pixel-btn">เช่าตอนนี้</a>
            <div class="banner-icon">🐱</div> </div>

        <div class="pixel-card" style="background: #e6f7ff; border-color: var(--pixel-blue);">
            <h3>Pro Gaming</h3>
            <p style="font-size: 10px; color: #777;">ระบบครบวงจร</p>
            <div class="price" style="color: #219ebc;">300 THB / Month</div>
            <a href="#" class="pixel-btn" style="background: var(--pixel-blue); border-color: var(--pixel-blue);">เช่าตอนนี้</a>
            <div class="banner-icon">🎮</div> </div>

        </div>
</div>

</body>
</html>
