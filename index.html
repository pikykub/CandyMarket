<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Candy Pixel Market</title>

<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Press Start 2P', cursive;
    background: #fef6d8;
    color: #5a4a2f;
}

/* พื้นหลังพิกเซล */
body::before {
    content: "";
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: linear-gradient(#f9e9a8 2px, transparent 2px),
                      linear-gradient(90deg, #f9e9a8 2px, transparent 2px);
    background-size: 20px 20px;
    opacity: 0.2;
    z-index: -1;
}

/* กล่อง pixel */
.pixel-box {
    background: #fff3c4;
    border: 4px solid #e3c977;
    box-shadow: 6px 6px 0 #d2b55b;
    padding: 20px;
    margin: 20px;
    border-radius: 8px;
}

/* ปุ่ม pixel */
.pixel-btn {
    background: #ffd966;
    border: 3px solid #c9a73d;
    padding: 12px 18px;
    cursor: pointer;
    box-shadow: 3px 3px 0 #b8952f;
    transition: 0.1s;
}

.pixel-btn:hover {
    transform: translate(2px,2px);
    box-shadow: 1px 1px 0 #b8952f;
}

/* header */
header {
    text-align: center;
    padding: 30px;
}

/* grid */
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit,minmax(250px,1fr));
    gap: 20px;
}

/* ราคา */
.price {
    font-size: 14px;
    margin: 10px 0;
}

/* footer */
footer {
    text-align: center;
    padding: 20px;
    font-size: 10px;
}
</style>
</head>

<body>

<header>
    <h1>🍬 Candy Pixel Market</h1>
    <p>บริการเช่าเว็บไซต์สไตล์น่ารัก</p>
</header>

<section class="pixel-box">
    <h2>💻 แพ็กเกจเช่าเว็บ</h2>

    <div class="grid">

        <div class="pixel-box">
            <h3>Starter</h3>
            <p class="price">฿99 / เดือน</p>
            <button class="pixel-btn">เช่าเลย</button>
        </div>

        <div class="pixel-box">
            <h3>Pro</h3>
            <p class="price">฿199 / เดือน</p>
            <button class="pixel-btn">เช่าเลย</button>
        </div>

        <div class="pixel-box">
            <h3>Premium</h3>
            <p class="price">฿299 / เดือน</p>
            <button class="pixel-btn">เช่าเลย</button>
        </div>

    </div>
</section>

<section class="pixel-box">
    <h2>✨ จุดเด่น</h2>
    <p>- ใช้งานง่าย</p>
    <p>- เว็บโหลดไว</p>
    <p>- ธีมน่ารักไม่ซ้ำใคร</p>
</section>

<footer>
    © 2026 Candy Pixel Market
</footer>

</body>
</html>
