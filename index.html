<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandyMarket | ระบบเช่าเว็บไซต์</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;900&family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fff5f7; font-family: 'Kanit', sans-serif; color: #5a5a5a; overflow-x: hidden; }
        .grid-bg { background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px); background-size: 25px 25px; }
        .candy-text { background: linear-gradient(to right, #ff8da1, #8ec5fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* อนิเมชั่นเดิมทั้งหมด */
        @keyframes gradientMove { 0%, 100% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } }
        .user-name-animate { background: linear-gradient(-45deg, #7db9f9, #f07ab0, #ffffff, #bfe9ff); background-size: 300% 300%; animation: gradientMove 3s ease infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900; }
        .admin-rainbow-text { background: linear-gradient(to right, #ff2400, #e8b71d, #1de840, #1ddde8, #2b1de8, #dd1de8, #ff2400); background-size: 400% 400%; animation: gradientMove 3s linear infinite; -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 900 !important; filter: drop-shadow(0 0 5px rgba(255,192,203,0.5)); }
        @keyframes badgeBounce { 0%, 100% { transform: translateY(0) scale(1); } 50% { transform: translateY(-3px) scale(1.05); } }
        .owner-badge { display: inline-flex; align-items: center; gap: 4px; background: linear-gradient(45deg, #ff9a9e, #fecfef); color: #ff4d6d; padding: 2px 10px; border-radius: 50px; font-size: 10px; font-weight: 900; border: 2px solid #fff; animation: badgeBounce 2s ease-in-out infinite; }

        /* ระบบ Modal & Card */
        .overlay { position: fixed; inset: 0; background: rgba(255, 182, 193, 0.4); backdrop-filter: blur(8px); z-index: 10005; display: none; align-items: center; justify-content: center; padding: 20px; }
        .pop-card { background: white; width: 100%; max-width: 350px; border-radius: 3rem; padding: 30px; border: 5px solid #fff; box-shadow: 0 20px 40px rgba(240, 122, 176, 0.2); transform: scale(0.8); transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .pop-card.show { transform: scale(1); }
        .auth-input { width: 100%; padding: 15px 20px; border-radius: 20px; border: 2px solid #fff0f3; background: #fffafa; margin-bottom: 15px; outline: none; }
        .control-panel { position: absolute; top: 75px; right: 20px; width: 280px; background: white; border-radius: 2.5rem; padding: 20px; box-shadow: 0 15px 35px rgba(240, 122, 176, 0.2); border: 4px solid #fff; display: none; z-index: 10000; }
        .menu-item { display: flex; align-items: center; gap: 12px; padding: 12px; border-radius: 18px; cursor: pointer; transition: 0.2s; color: #666; font-weight: 500; }
        .menu-item:hover { background: #fff0f3; transform: translateX(5px); }
        
        /* Loader & Toast */
        #process-loader, #loader { position: fixed; inset: 0; background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(4px); z-index: 20000; display: flex; align-items: center; justify-content: center; }
        #loader { background: #fff5f7; z-index: 99999; transition: 0.5s; }
        .cookie-spin { font-size: 60px; color: #f07ab0; animation: spin 1s infinite linear; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        #candy-toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-150%); width: 90%; max-width: 350px; background: white; border-radius: 25px; padding: 15px 20px; box-shadow: 0 15px 35px rgba(240, 122, 176, 0.2); border: 3px solid #fff; z-index: 20001; transition: 0.5s; display: flex; align-items: center; gap: 15px; }
        #candy-toast.show { transform: translateX(-50%) translateY(0); }
        .custom-scrollbar::-webkit-scrollbar { width: 5px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #ffcad4; border-radius: 10px; }
    </style>
</head>
<body class="grid-bg pb-20">

    <div id="loader"><i class="fa-solid fa-cookie-bite cookie-spin"></i></div>
    <div id="process-loader" style="display:none;"><i class="fa-solid fa-cookie-bite cookie-spin"></i></div>

    <div id="candy-toast">
        <div id="toast-icon-bg" class="w-12 h-12 rounded-xl flex items-center justify-center text-xl shrink-0"><i id="toast-i" class="fa-solid"></i></div>
        <div><h4 id="toast-title" class="font-black text-sm text-gray-700"></h4><p id="toast-msg" class="text-xs text-gray-500 font-medium"></p></div>
    </div>

    <header class="flex justify-between items-center px-6 py-4 sticky top-0 bg-white/80 backdrop-blur-md z-50 border-b border-pink-100">
        <h1 class="text-2xl font-black candy-text">CandyMarket.</h1>
        <div id="auth-section"></div>
        <div id="user-panel" class="control-panel custom-scrollbar">
            <div class="px-2 py-3 border-b border-pink-50 mb-2">
                <p class="text-[9px] font-bold text-gray-400 uppercase">Welcome back!</p>
                <div class="flex items-center gap-2">
                    <img id="menu-avatar" class="w-10 h-10 rounded-full border-2 border-pink-100 object-cover hidden">
                    <div id="menu-avatar-temp" class="w-10 h-10 rounded-full bg-pink-100 text-pink-400 flex items-center justify-center"><i class="fa-solid fa-cookie text-xl"></i></div>
                    <div><h4 id="menu-nickname" class="user-name-animate text-lg leading-tight">Guest</h4><p class="text-[9px] text-gray-300 font-bold">UID: <span id="menu-uid" class="text-pink-300">---</span></p></div>
                </div>
            </div>
            <div class="bg-gradient-to-r from-yellow-50 to-orange-50 rounded-2xl p-3 mb-2 flex justify-between items-center border border-yellow-100">
                <div><p class="text-[9px] font-black text-yellow-500">MY BALANCE</p><h4 class="text-xl font-black text-yellow-600">฿<span id="menu-balance">0</span></h4></div>
                <button onclick="ui.modal('topup-modal', true)" class="w-8 h-8 rounded-xl bg-yellow-400 text-white shadow-md active:scale-95">+</button>
            </div>
            <div onclick="ui.modal('profile-modal', true)" class="menu-item"><i class="fa-solid fa-user-gear text-pink-400"></i><span>จัดการโปรไฟล์</span></div>
            <div onclick="ui.modal('status-modal', true)" class="menu-item"><i class="fa-solid fa-desktop text-blue-400"></i><span>สถานะเว็บ</span></div>
            <div onclick="ui.modal('history-modal', true)" class="menu-item"><i class="fa-solid fa-history text-purple-400"></i><span>ประวัติการเติมเงิน</span></div>
            <button onclick="ui.logout()" class="w-full mt-3 py-2 text-[10px] font-black text-gray-400 uppercase">Logout</button>
        </div>
    </header>

    <main class="mx-5 mt-6">
        <div class="relative rounded-[3.5rem] overflow-hidden bg-gradient-to-br from-[#bfe9ff] via-[#ffcaf2] to-[#ffbdc7] p-10 min-h-[240px] flex flex-col justify-center shadow-xl border-4 border-white mb-6">
            <h3 class="text-6xl font-black italic tracking-tighter text-white drop-shadow-lg leading-[0.9]">CANDY<br>RENTAL</h3>
            <p class="text-[11px] text-white/90 mt-4 font-bold uppercase">รายวัน / รายเดือน สดใสที่สุดในโลก!</p>
        </div>

        <div class="flex gap-4 mb-8">
            <div class="flex-1 bg-white p-6 rounded-[2.5rem] border-2 border-pink-50 shadow-sm text-center">
                <p class="text-pink-300 text-[10px] font-black uppercase">ลูกค้า</p><h4 class="text-4xl font-black text-[#f07ab0]" id="stat-users">0</h4>
            </div>
            <div class="flex-1 bg-white p-6 rounded-[2.5rem] border-2 border-blue-50 shadow-sm text-center">
                <p class="text-blue-300 text-[10px] font-black uppercase">ขนม</p><h4 class="text-4xl font-black text-[#7db9f9]" id="stat-prods">0</h4>
            </div>
        </div>

        <h3 class="text-lg font-black text-gray-600 mb-6 px-2"><i class="fa-solid fa-gift text-pink-400"></i> รายการแนะนำ</h3>
        <div id="product-container" class="grid grid-cols-2 gap-4"></div>
    </main>

    <div id="auth-modal" class="overlay"><div class="pop-card">
        <h2 id="auth-title" class="text-3xl font-black text-center mb-8 candy-text italic uppercase">Sign In</h2>
        <input type="text" id="user-input" class="auth-input" placeholder="Username...">
        <input type="password" id="pass-input" class="auth-input" placeholder="Password...">
        <button id="auth-btn" class="bg-gradient-to-r from-[#f07ab0] to-[#ffb347] text-white w-full py-4 rounded-2xl font-black shadow-lg">ยืนยัน</button>
        <p id="toggle-auth" class="text-center mt-5 text-sm text-pink-400 font-bold cursor-pointer">สมัครสมาชิกที่นี่</p>
        <button onclick="ui.modal('auth-modal', false)" class="block mx-auto mt-4 text-gray-400 text-xs font-bold uppercase">Close</button>
    </div></div>

    <div id="topup-modal" class="overlay"><div class="pop-card">
        <h2 class="text-2xl font-black text-center mb-6 text-transparent bg-clip-text bg-gradient-to-r from-[#ffb347] to-[#f07ab0] italic uppercase">Top Up</h2>
        <div class="bg-gray-50 border-2 border-white shadow-inner rounded-3xl p-4 flex flex-col items-center mb-6">
            <p class="text-[10px] font-black text-gray-400">ยอดเงินคงเหลือ</p>
            <h4 class="text-3xl font-black text-[#ffb347]">฿<span id="modal-current-balance">0</span></h4>
        </div>
        <input type="number" id="topup-amount-val" class="auth-input" placeholder="จำนวนเงิน">
        <button id="confirm-topup-btn" class="bg-gradient-to-r from-[#ffb347] to-[#f07ab0] text-white w-full py-4 rounded-2xl font-black shadow-lg mb-3">ยืนยันการเติมเงิน</button>
        <button onclick="ui.modal('slip-modal', true)" class="w-full py-3 bg-pink-50 text-pink-400 rounded-2xl font-black text-[10px] border-2 border-white">แจ้งโอนด้วยสลิป</button>
        <button onclick="ui.modal('topup-modal', false)" class="block mx-auto mt-6 text-gray-300 text-[10px] font-black uppercase">Close</button>
    </div></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getDatabase, ref, onValue, set, update, push } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = { 
            apiKey: "AIzaSyBJEO4o365sI4XFZD4IRIaDjetIMNtCMwU",
            authDomain: "candy-market-system.firebaseapp.com",
            databaseURL: "https://candy-market-system-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "candy-market-system",
            storageBucket: "candy-market-system.firebasestorage.app"
        };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getDatabase(app);
        let userLocal = null;

        // UI Manager: รวมคำสั่งที่ใช้บ่อยให้สั้นลง
        window.ui = {
            modal: (id, show) => {
                const el = document.getElementById(id);
                if(show) { el.style.display = 'flex'; setTimeout(() => el.querySelector('.pop-card').classList.add('show'), 10); }
                else { el.querySelector('.pop-card').classList.remove('show'); setTimeout(() => el.style.display = 'none', 300); }
                document.getElementById('user-panel').style.display = 'none';
            },
            toast: (title, msg, type = 'success') => {
                const t = document.getElementById('candy-toast');
                document.getElementById('toast-title').innerText = title;
                document.getElementById('toast-msg').innerText = msg;
                document.getElementById('toast-icon-bg').className = `w-12 h-12 rounded-xl flex items-center justify-center text-xl shrink-0 ${type === 'success' ? 'bg-green-100 text-green-500' : 'bg-red-100 text-red-500'}`;
                document.getElementById('toast-i').className = type === 'success' ? "fa-solid fa-check-circle" : "fa-solid fa-circle-exclamation";
                t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 3500);
            },
            logout: () => signOut(auth).then(() => location.reload())
        };

        // Auth & Logic
        let isLogin = true;
        document.getElementById('toggle-auth').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Sign In" : "Register";
            document.getElementById('auth-btn').innerText = isLogin ? "เข้าสู่ระบบ" : "สมัครสมาชิก";
        };

        document.getElementById('auth-btn').onclick = async () => {
            const u = document.getElementById('user-input').value.trim();
            const p = document.getElementById('pass-input').value.trim();
            if(!u || !p) return ui.toast("อุ๊ปส์!", "กรอกข้อมูลก่อนน้า", "error");
            document.getElementById('process-loader').style.display = 'flex';
            try {
                const email = (u === "AdminPeach") ? "feirnbiddu10@gmail.com" : `${u}@candymarket.com`;
                if(isLogin) await signInWithEmailAndPassword(auth, email, p);
                else {
                    const res = await createUserWithEmailAndPassword(auth, email, p);
                    await set(ref(db, `users/${res.user.uid}`), { username: u, balance: 0, uid: Date.now() });
                }
                ui.modal('auth-modal', false);
            } catch (err) { ui.toast("ผิดพลาด", "ข้อมูลไม่ถูกต้องค่ะ", "error"); }
            finally { document.getElementById('process-loader').style.display = 'none'; }
        };

        onAuthStateChanged(auth, (user) => {
            const section = document.getElementById('auth-section');
            if(user) {
                onValue(ref(db, `users/${user.uid}`), (snap) => {
                    userLocal = snap.val();
                    document.getElementById('menu-nickname').innerText = userLocal.username;
                    document.getElementById('menu-balance').innerText = userLocal.balance || 0;
                    document.getElementById('menu-uid').innerText = userLocal.uid;
                    section.innerHTML = `<button onclick="const p=document.getElementById('user-panel'); p.style.display=(p.style.display==='block'?'none':'block')" class="w-12 h-12 rounded-full bg-white border-2 border-pink-200 text-pink-400 flex items-center justify-center shadow-md"><i class="fa-solid fa-cookie text-2xl"></i></button>`;
                });
            } else {
                section.innerHTML = `<button onclick="ui.modal('auth-modal', true)" class="bg-gradient-to-r from-[#f07ab0] to-[#ffb347] text-white px-7 py-2.5 rounded-full text-xs font-black shadow-lg">Sign In</button>`;
            }
        });

        // โหลดสินค้า
        onValue(ref(db, 'products'), snap => {
            const cont = document.getElementById('product-container'); cont.innerHTML = '';
            snap.forEach(child => {
                const p = child.val();
                cont.innerHTML += `<div class="bg-white border-2 border-pink-50 rounded-[3rem] p-4 flex flex-col shadow-sm">
                    <img src="${p.image}" class="rounded-[2.2rem] mb-4 aspect-square object-cover">
                    <h4 class="font-black text-sm text-gray-700 truncate mb-1">${p.name}</h4>
                    <p class="text-pink-500 font-black text-2xl mb-4">฿${p.price}</p>
                    <button class="bg-pink-50 text-pink-500 py-3 rounded-2xl font-black text-[9px] uppercase shadow-sm">เช่าเว็บ</button>
                </div>`;
            });
        });

        window.onload = () => { setTimeout(() => document.getElementById('loader').style.display='none', 600); };
    </script>
</body>
</html>
