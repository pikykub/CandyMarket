<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CandyMarket | ระบบเช่าเว็บไซต์</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
background:#fff5f7;
font-family:'Kanit',sans-serif;
}

.grid-bg{
background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px);
background-size:25px 25px;
}

.candy-text{
background:linear-gradient(to right,#ff8da1,#8ec5fc);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.pop{
background:white;
padding:30px;
border-radius:30px;
width:100%;
max-width:360px;
box-shadow:0 20px 40px rgba(0,0,0,.15);
}

.overlay{
position:fixed;
inset:0;
background:rgba(0,0,0,.3);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.input{
width:100%;
padding:12px 15px;
border-radius:15px;
border:2px solid #ffd1dc;
margin-bottom:10px;
}

.btn{
background:linear-gradient(90deg,#ff8da1,#ffb347);
color:white;
padding:12px;
border-radius:20px;
width:100%;
font-weight:bold;
}

</style>
</head>

<body class="grid-bg">

<header class="flex justify-between p-5 bg-white shadow">

<h1 class="text-2xl font-black candy-text">
CandyMarket
</h1>

<div id="auth-area"></div>

</header>

<div class="p-6">

<h2 class="text-xl font-black mb-4">
รายการเว็บให้เช่า
</h2>

<div id="products" class="grid grid-cols-2 gap-4"></div>

</div>

<!-- LOGIN -->

<div id="authModal" class="overlay">

<div class="pop">

<h2 class="text-center font-black text-xl mb-4">
Login
</h2>

<input id="user" class="input" placeholder="Username">

<input id="pass" class="input" type="password" placeholder="Password">

<button id="loginBtn" class="btn">
เข้าสู่ระบบ
</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getDatabase,ref,onValue,set } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBJEO4o365sI4XFZD4IRIaDjetIMNtCMwU",
authDomain:"candy-market-system.firebaseapp.com",
databaseURL:"https://candy-market-system-default-rtdb.asia-southeast1.firebasedatabase.app",
projectId:"candy-market-system",
storageBucket:"candy-market-system.firebasestorage.app",
messagingSenderId:"955686244672",
appId:"1:955686244672:web:484fdc3d7192d3074c2aa5"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getDatabase(app);

function openLogin(){
document.getElementById("authModal").style.display="flex"
}

function closeLogin(){
document.getElementById("authModal").style.display="none"
}

document.getElementById("loginBtn").onclick=async()=>{

let u=document.getElementById("user").value
let p=document.getElementById("pass").value

let email=u+"@candy.com"

try{

await signInWithEmailAndPassword(auth,email,p)

closeLogin()

}catch{

let res=await createUserWithEmailAndPassword(auth,email,p)

await set(ref(db,"users/"+res.user.uid),{
username:u
})

closeLogin()

}

}

onAuthStateChanged(auth,user=>{

let area=document.getElementById("auth-area")

if(user){

area.innerHTML=`
<button onclick="logout()" class="bg-pink-400 text-white px-4 py-2 rounded-full">
Logout
</button>
`

}else{

area.innerHTML=`
<button onclick="openLogin()" class="bg-pink-400 text-white px-4 py-2 rounded-full">
Login
</button>
`

}

})

window.logout=()=>{
signOut(auth)
}

onValue(ref(db,"products"),snap=>{

let box=document.getElementById("products")

box.innerHTML=""

snap.forEach(child=>{

let p=child.val()

box.innerHTML+=`

<div class="bg-white p-4 rounded-3xl shadow">

<img src="${p.image}" class="rounded-xl mb-2">

<h3 class="font-bold">${p.name}</h3>

<p class="text-pink-500 font-black">
฿${p.price}
</p>

</div>

`

})

})

window.openLogin=openLogin

</script>

</body>
</html>
