<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CandyMarket | ระบบเช่าเว็บอัตโนมัติ</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:'Kanit',sans-serif;
background:#f8fbff;
color:#334155;
}

/* Candy Theme */

:root{
--blue:#60a5fa;
--pink:#f472b6;
}

.btn-primary{
background:linear-gradient(90deg,#60a5fa,#f472b6);
color:white;
border-radius:8px;
font-weight:600;
transition:0.2s;
}

.btn-primary:active{
transform:scale(.97);
}

/* Banner */

.candy-banner{
background:linear-gradient(135deg,#60a5fa,#f472b6);
border-bottom:4px solid #f472b6;
}

/* Page */

.page-section{
display:none;
}

.page-section.active{
display:block;
}

/* Chat */

.chat-bubble{
max-width:85%;
padding:8px 12px;
border-radius:12px;
font-size:13px;
margin-bottom:6px;
}

.chat-me{
background:#60a5fa;
color:white;
align-self:flex-end;
}

.chat-other{
background:#f1f5f9;
}

/* Floating Chat */

#floating-chat-btn{
position:fixed;
bottom:20px;
left:20px;
z-index:100;
}

#chat-window{
position:fixed;
bottom:85px;
left:20px;
width:320px;
height:450px;
background:white;
border-radius:16px;
box-shadow:0 10px 40px rgba(0,0,0,.2);
display:none;
flex-direction:column;
overflow:hidden;
}

</style>

</head>

<body class="flex flex-col min-h-screen">

<!-- NAV -->

<nav class="bg-white shadow sticky top-0 z-50">

<div class="max-w-7xl mx-auto px-4">

<div class="flex justify-between items-center h-16">

<div class="flex items-center gap-2 cursor-pointer" onclick="showPage('home')">

<div class="w-10 h-10 rounded bg-gradient-to-r from-blue-400 to-pink-400 flex items-center justify-center text-white font-black">C</div>

<span class="font-extrabold text-xl">
Candy<span class="text-pink-500">Market</span>
</span>

</div>

<div class="flex items-center gap-4 text-sm font-bold text-slate-600">

<a onclick="showPage('home')" class="cursor-pointer hover:text-pink-500">หน้าหลัก</a>
<a onclick="showPage('shop')" class="cursor-pointer hover:text-pink-500">สินค้า</a>
<a onclick="showPage('topup')" class="cursor-pointer hover:text-pink-500">เติมเงิน</a>

</div>

</div>

</div>

</nav>

<!-- CHAT BUTTON -->

<button id="floating-chat-btn"
onclick="toggleChat()"
class="w-14 h-14 bg-pink-500 rounded-full text-white shadow-xl flex items-center justify-center">

<i class="fa-solid fa-comments text-2xl"></i>

</button>

<div id="chat-window">

<div class="bg-blue-500 p-3 text-white flex justify-between">

<b>แชทลูกค้า</b>

<button onclick="toggleChat()">✕</button>

</div>

<div id="chat-group"
class="flex-1 overflow-y-auto p-3 bg-slate-50"></div>

<div class="p-2 border-t flex gap-2">

<input
type="text"
id="chat-input"
class="flex-1 border rounded px-2 py-1"
placeholder="พิมพ์ข้อความ...">

<button
onclick="sendChat()"
class="btn-primary px-3">

ส่ง

</button>

</div>

</div>

<!-- HOME -->

<div id="page-home" class="page-section active">

<div class="candy-banner h-[260px] flex flex-col items-center justify-center text-white text-center">

<h1 class="text-5xl font-black">
CandyMarket
</h1>

<p class="mt-2 text-lg">
แพลตฟอร์มปล่อยเช่าเว็บไซต์อัตโนมัติ
</p>

</div>

<div class="max-w-7xl mx-auto px-4 mt-10">

<h2 class="text-xl font-bold mb-4">
แพ็กเกจเว็บไซต์
</h2>

<div id="product-grid"
class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

</div>

</div>

<!-- SHOP -->

<div id="page-shop" class="page-section">

<div class="max-w-7xl mx-auto px-4 mt-10">

<h2 class="text-xl font-bold mb-4">
สินค้าทั้งหมด
</h2>

<div id="shop-grid"
class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

</div>

</div>

<!-- TOPUP -->

<div id="page-topup" class="page-section">

<div class="max-w-md mx-auto mt-10 bg-white p-6 rounded-xl shadow">

<h2 class="text-xl font-bold text-center mb-4">
เติมเงิน
</h2>

<div class="text-center">

<div class="w-40 h-40 bg-gray-100 mx-auto flex items-center justify-center text-xs">

QR CODE

</div>

<p class="mt-3 text-sm text-slate-500">

เลขบัญชี

</p>

<p class="font-bold text-blue-500">

000-0-00000

</p>

</div>

<label class="block mt-4">

<input type="file"
class="hidden"
onchange="autoTopup(this)">

<div class="btn-primary py-3 text-center cursor-pointer">

แนบสลิป

</div>

</label>

</div>

</div>

<script>

/* Products */

function generateProducts(){

let grid=document.getElementById("product-grid")
let shop=document.getElementById("shop-grid")

for(let i=1;i<=8;i++){

let html=`

<div class="bg-white rounded-xl shadow border overflow-hidden">

<div class="aspect-square bg-slate-100 flex items-center justify-center text-xs">

IMAGE

</div>

<div class="p-3">

<h3 class="font-bold text-sm">

แพ็กเกจเว็บ ${i}

</h3>

<div class="flex justify-between mt-2">

<span class="text-pink-500 font-black">

฿${(i*100)}

</span>

<button
onclick="alert('สั่งซื้อสำเร็จ')"
class="bg-blue-50 text-blue-500 w-8 h-8 rounded-full">

<i class="fa-solid fa-cart-shopping text-xs"></i>

</button>

</div>

</div>

</div>
`

grid.innerHTML+=html
shop.innerHTML+=html

}

}

/* Chat */

function toggleChat(){

let win=document.getElementById("chat-window")

win.style.display=win.style.display==="flex"?"none":"flex"

}

function sendChat(){

let input=document.getElementById("chat-input")

if(!input.value)return

let box=document.getElementById("chat-group")

box.innerHTML+=`

<div class="chat-bubble chat-me">

${input.value}

</div>
`

input.value=""

}

/* Topup */

let balance=0

function autoTopup(input){

if(input.files.length){

setTimeout(()=>{

balance+=100

alert("เติมเงินสำเร็จ +100")

},1000)

}

}

/* Page */

function showPage(id){

document
.querySelectorAll(".page-section")
.forEach(p=>p.classList.remove("active"))

document
.getElementById("page-"+id)
.classList.add("active")

window.scrollTo(0,0)

}

generateProducts()

</script>

</body>
</html>
