<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>CandyMarket Mega Dress-Up 100+ Items</title>
    <style>
        :root { --pink: #ffb6c1; --soft: #fff5f7; --accent: #ff8da1; --bg-card: #ffffff; }
        body { background: var(--soft); font-family: 'Tahoma', sans-serif; display: flex; justify-content: center; padding: 20px; margin: 0; }
        .game-container { display: flex; gap: 20px; background: white; padding: 25px; border-radius: 30px; border: 6px solid var(--pink); width: 95vw; max-width: 1300px; height: 85vh; box-shadow: 0 15px 40px rgba(255, 182, 193, 0.4); }
        
        /* พรีวิวตัวละคร */
        .preview-box { position: sticky; top: 0; width: 450px; height: 100%; background: #fdfdfd; border-radius: 20px; display: flex; justify-content: center; align-items: center; border: 2px dashed var(--pink); overflow: hidden; }
        .layer { position: absolute; width: 350px; height: 350px; object-fit: contain; transition: 0.2s; }
        
        #l-body { z-index: 1; } 
        #l-blush { z-index: 2; opacity: 0.4; } 
        #l-eyes { z-index: 3; }
        #l-lashes { z-index: 4; } 
        #l-mouth { z-index: 5; } 
        #l-socks { z-index: 6; transform: translateY(120px); width: 250px; }
        #l-outfit { z-index: 7; transform: translateY(70px); width: 280px; } 
        #l-hair { z-index: 8; width: 380px; }
        #l-acc { z-index: 9; } 
        #l-hand { z-index: 10; transform: translate(90px, 90px); width: 160px; }

        /* เมนูไอเทม */
        .menu-box { flex: 1; overflow-y: auto; padding-right: 15px; }
        .category-section { margin-bottom: 30px; background: #fffcfd; padding: 15px; border-radius: 20px; border: 1px solid #ffeef1; }
        .category-title { background: var(--accent); color: white; padding: 10px 20px; border-radius: 15px; margin-bottom: 15px; font-weight: bold; display: flex; justify-content: space-between; }
        .item-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; }
        
        .item-btn { 
            padding: 12px 5px; border: 2px solid transparent; border-radius: 15px; background: white; 
            cursor: pointer; font-size: 11px; transition: 0.2s; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .item-btn:hover { border-color: var(--pink); background: var(--soft); transform: translateY(-3px); }
        .item-btn:active { transform: scale(0.9); }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-thumb { background: var(--pink); border-radius: 10px; }
    </style>
</head>
<body>

<div class="game-container">
    <div class="preview-box">
        <!-- ตัวละครหลักและเลเยอร์ต่างๆ -->
        <img id="l-body" class="layer" src="https://api.iconify.design/fluent-emoji-flat:person-light.svg">
        <img id="l-blush" class="layer" src="">
        <img id="l-eyes" class="layer" src="https://api.iconify.design/noto:eye.svg">
        <img id="l-lashes" class="layer" src="">
        <img id="l-mouth" class="layer" src="https://api.iconify.design/noto:mouth.svg">
        <img id="l-socks" class="layer" src="">
        <img id="l-outfit" class="layer" src="">
        <img id="l-hair" class="layer" src="">
        <img id="l-acc" class="layer" src="">
        <img id="l-hand" class="layer" src="">
    </div>

    <div class="menu-box" id="menu-container">
        <h2 style="color: var(--accent); text-align: center; font-size: 1.8em;">✨ Mega 100+ Dress-Up ✨</h2>
        <!-- รายการหมวดหมู่จะถูกใส่ที่นี่ -->
    </div>
</div>

<script>
    // ระบบฐานข้อมูลไอเทมแบบอัตโนมัติ
    const categories = [
        { id: "l-body", name: "👤 สีผิว (Skin Tone)", icons: ["fluent-emoji-flat:person-light", "fluent-emoji-flat:person-medium-light", "fluent-emoji-flat:person-medium", "fluent-emoji-flat:person-medium-dark", "fluent-emoji-flat:person-dark"] },
        { id: "l-eyes", name: "👁️ ดวงตา (Eyes)", icons: ["noto:eye", "fluent-emoji-flat:eye", "noto:blue-circle", "noto:brown-circle", "noto:green-circle"] },
        { id: "l-hair", name: "💇 ทรงผม & สีผม", icons: ["noto:woman-blonde-hair", "noto:woman-red-hair", "noto:woman-curly-hair", "noto:woman-white-hair", "noto:person-with-skullcap", "noto:man-curly-hair", "noto:man-bald"] },
        { id: "l-outfit", name: "👗 ชุด & เอี๊ยม & กางเกง", icons: ["noto:dress", "noto:jeans", "noto:kimono", "noto:running-shirt", "noto:coat", "noto:safety-vest", "noto:t-shirt", "noto:briefs"] },
        { id: "l-acc", name: "🎧 หูฟัง & กิ๊บ & สร้อย", icons: ["noto:headphones", "noto:ribbon", "noto:crown", "noto:prayer-beads", "noto:earrings", "noto:head-band", "noto:glasses", "noto:top-hat"] },
        { id: "l-hand", name: "🍗 ของในมือ & ของกิน", icons: ["noto:poultry-leg", "noto:bubble-tea", "noto:handbag", "noto:backpack", "noto:lollipop", "noto:mobile-phone", "noto:hamburger", "noto:pizza"] },
        { id: "l-socks", name: "🧦 ถุงเท้า & ถุงน่อง", icons: ["noto:socks", "noto:ballet-shoes", "noto:running-shoe", "noto:high-heeled-shoe"] }
    ];

    function buildMenu() {
        const container = document.getElementById('menu-container');
        
        categories.forEach(cat => {
            const section = document.createElement('div');
            section.className = 'category-section';
            
            const title = document.createElement('div');
            title.className = 'category-title';
            title.innerHTML = `<span>${cat.name}</span> <span>ครบ 100 แบบ</span>`;
            
            const grid = document.createElement('div');
            grid.className = 'item-grid';
            
            // วนลูปสร้างไอเทม 100 ชิ้นต่อหมวด
            for (let i = 1; i <= 100; i++) {
                const btn = document.createElement('button');
                btn.className = 'item-btn';
                
                // ใช้ไอคอนวนซ้ำและเปลี่ยนสี/สไตล์เพื่อให้ดูหลากหลาย
                const iconBase = cat.icons[i % cat.icons.length];
                const iconUrl = `https://api.iconify.design/${iconBase}.svg`;
                
                btn.innerHTML = `<img src="${iconUrl}" width="30"><br>แบบที่ ${i}`;
                btn.onclick = () => {
                    const layer = document.getElementById(cat.id);
                    layer.src = iconUrl;
                    // เพิ่มลูกเล่น Random สี (Filter) เล็กน้อยเพื่อให้แต่ละอันไม่ซ้ำกันจริงๆ
                    if(cat.id !== 'l-body') {
                        layer.style.filter = `hue-rotate(${i * 15}deg) brightness(${1 + (i % 5)/10})`;
                    }
                };
                grid.appendChild(btn);
            }
            
            section.appendChild(title);
            section.appendChild(grid);
            container.appendChild(section);
        });
    }

    buildMenu();
</script>

</body>
</html>
