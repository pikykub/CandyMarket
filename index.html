<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peach Pixel Market</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Mali&display=swap" rel="stylesheet">

<style>
body{
    background:#e8f5c8;
    font-family:'Mali',cursive;
}
.pixel{
    font-family:'Press Start 2P',cursive;
}
.box{
    border:4px solid #5d4037;
    box-shadow:6px 6px 0 #5d4037;
    background:#fff9c4;
}
.btn{
    border:3px solid #5d4037;
    box-shadow:4px 4px 0 #5d4037;
}
.btn:active{
    transform:translate(2px,2px);
    box-shadow:2px 2px 0 #5d4037;
}
</style>
</head>

<body class="p-4">

<!-- HEADER -->
<div class="box p-4 flex justify-between items-center">
    <h1 class="pixel text-pink-500">PEACH MARKET</h1>
    <div id="auth"></div>
</div>

<!-- MAIN -->
<div class="mt-6 grid grid-cols-2 gap-4" id="products"></div>

<!-- MODAL LOGIN -->
<div id="loginModal" class="fixed inset-0 hidden items-center justify-center bg-black/50">
    <div class="box p-6 w-80">
        <h2 class="pixel mb-4">LOGIN</h2>
        <input id="user" class="w-full mb-2 p-2 border" placeholder="username">
        <input id="pass" type="password" class="w-full mb-4 p-2 border" placeholder="password">
        <button onclick="login()" class="btn w-full py-2 bg-pink-300">Login</button>
    </div>
</div>

<script>
/* =========================
   SIMPLE LOCAL SYSTEM
========================= */

let currentUser = JSON.parse(localStorage.getItem("user")) || null;

const products = [
    {name:"Candy Web",price:50},
    {name:"Sweet Shop",price:80},
    {name:"Pixel Blog",price:30},
];

function renderAuth(){
    const el = document.getElementById("auth");
    if(currentUser){
        el.innerHTML = `
            <span>${currentUser.username} | ฿${currentUser.balance}</span>
            <button onclick="logout()" class="btn px-2 ml-2 bg-red-300">ออก</button>
        `;
    }else{
        el.innerHTML = `<button onclick="openLogin()" class="btn px-3 bg-green-300">เข้าสู่ระบบ</button>`;
    }
}

function renderProducts(){
    const el = document.getElementById("products");
    el.innerHTML="";
    products.forEach(p=>{
        el.innerHTML += `
        <div class="box p-4">
            <h3 class="pixel text-xs mb-2">${p.name}</h3>
            <p class="mb-4">฿${p.price}</p>
            <button onclick="rent('${p.name}',${p.price})" class="btn w-full bg-yellow-300 py-2">เช่า</button>
        </div>`;
    });
}

/* =========================
   AUTH
========================= */

function openLogin(){
    document.getElementById("loginModal").style.display="flex";
}

function login(){
    const user = document.getElementById("user").value;
    const pass = document.getElementById("pass").value;

    if(!user || !pass) return alert("กรอกก่อน");

    currentUser = {
        username:user,
        balance:100
    };

    localStorage.setItem("user",JSON.stringify(currentUser));
    document.getElementById("loginModal").style.display="none";
    renderAuth();
}

function logout(){
    localStorage.removeItem("user");
    location.reload();
}

/* =========================
   RENT
========================= */

function rent(name,price){
    if(!currentUser) return alert("กรุณาเข้าสู่ระบบ");

    if(currentUser.balance < price){
        alert("เงินไม่พอ");
        return;
    }

    currentUser.balance -= price;
    localStorage.setItem("user",JSON.stringify(currentUser));
    renderAuth();

    alert("เช่าสำเร็จ: "+name);
}

/* INIT */
renderAuth();
renderProducts();
</script>

</body>
</html>
