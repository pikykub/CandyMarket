<!DOCTYPE html>
<html lang="th">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CandyMarket | ระบบเช่าเว็บอัตโนมัติ</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;700;900&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>

body{
font-family:'Kanit',sans-serif;
background:#f8fbff;
}

:root{
--blue:#60a5fa;
--pink:#f472b6;
}

.btn{
background:linear-gradient(90deg,#60a5fa,#f472b6);
color:white;
font-weight:600;
border-radius:8px;
padding:8px 14px;
}

.page{
display:none;
}

.page.active{
display:block;
}

.banner{
background:linear-gradient(135deg,#60a5fa,#f472b6);
}

.chat-bubble{
max-width:80%;
padding:8px 12px;
border-radius:10px;
margin-bottom:6px;
font-size:13px;
}

.chat-me{
background:#60a5fa;
color:white;
margin-left:auto;
}

.chat-other{
background:#f1f5f9;
}

#chat-window{
position:fixed;
bottom:90px;
left:20px;
width:320px;
height:420px;
background:white;
border-radius:16px;
box-shadow:0 10px 30px rgba(0,0,0,.2);
display:none;
flex-direction:column;
overflow:hidden;
}

</style>

</head>

<body>

<!-- NAV -->

<nav class="bg-white shadow">

<div class="max-w-6xl mx-auto flex justify-between items-center h-16 px-4">

<div onclick="showPage('home')" class="flex items-center gap-2 cursor-pointer">

<div class="w-9 h-9 rounded bg-gradient-to-r from-blue-400 to-pink-400 flex items-center justify-center text-white font-bold">
C
</div>

<b class="text-xl">Candy<span class="text-pink-500">Market</span></b>

</div>

<div class="flex gap-4 text-sm font-bold">

<button onclick="showPage('home')">หน้าหลัก</button>
<button onclick="showPage('shop')">สินค้า</button>
<button onclick="showPage('topup')">เติมเงิน</button>
<button onclick="showPage('admin')">หลังบ้าน</button>

</div>

</div>

</nav>

<!-- CHAT BUTTON -->

<button onclick="toggleChat()"
class="fixed bottom-6 left-6 w-14 h-14 bg-pink-500 text-white rounded-full shadow">

<i class="fa-solid fa-comments"></i>

</button>

<div id="chat-window">

<div class="bg-blue-500 text-white p-3 flex justify-between">

<b>แชทลูกค้า</b>

<button onclick="toggleChat()">✕</button>

</div>

<div id="chat-box"
class="flex-1 p-3 overflow-y-auto bg-slate-50"></div>

<div class="p-2 flex gap-2 border-t">

<input id="chat-input"
class="flex-1 border rounded px-2 py-1"
placeholder="พิมพ์ข้อความ">

<button onclick="sendChat()" class="btn">
ส่ง
</button>

</div>

</div>

<!-- HOME -->

<div id="page-home" class="page active">

<div class="banner h-64 flex flex-col justify-center items-center text-white">

<h1 class="text-5xl font-black">
CandyMarket
</h1>

<p class="mt-2">
แพลตฟอร์มปล่อยเช่าเว็บไซต์
</p>

</div>

<div class="max-w-6xl mx-auto px-4 mt-8">

<h2 class="font-bold mb-4">
แพ็กเกจเว็บไซต์
</h2>

<div id="product-grid"
class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

</div>

</div>

<!-- SHOP -->

<div id="page-shop" class="page">

<div class="max-w-6xl mx-auto px-4 mt-8">

<h2 class="font-bold mb-4">
สินค้าทั้งหมด
</h2>

<div id="shop-grid"
class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>

</div>

</div>

<!-- TOPUP -->

<div id="page-topup" class="page">

<div class="max-w-md mx-auto bg-white shadow rounded-xl p-6 mt-10">

<h2 class="text-center font-bold mb-4">
เติมเงิน
</h2>

<div class="text-center">

<div class="w-40 h-40 bg-gray-100 mx-auto flex items-center justify-center">
QR
</div>

<p class="mt-2 text-sm">
เลขบัญชี
</p>

<b id="bank-number">
000-0-00000
</b>

</div>

<label class="block mt-4">

<input type="file"
class="hidden"
onchange="topup()">

<div class="btn text-center cursor-pointer">
แนบสลิป
</div>

</label>

</div>

</div>

<!-- ADMIN -->

<div id="page-admin" class="page">

<div class="max-w-5xl mx-auto mt-8 px-4">

<h2 class="font-bold text-xl mb-6">
ระบบหลังบ้าน
</h2>

<div class="grid md:grid-cols-2 gap-6">

<!-- DASHBOARD -->

<div class="bg-white p-4 rounded shadow">

<h3 class="font-bold mb-2">
สถิติ
</h3>

<p>ยอดผู้ใช้: <b id="stat-user">120</b></p>
<p>ยอดเว็บ: <b id="stat-site">20</b></p>

</div>

<!-- PRODUCT -->

<div class="bg-white p-4 rounded shadow">

<h3 class="font-bold mb-2">
เพิ่มแพ็กเกจ
</h3>

<input id="p-name"
class="border p-2 w-full mb-2"
placeholder="ชื่อแพ็กเกจ">

<input id="p-price"
class="border p-2 w-full mb-2"
placeholder="ราคา">

<button onclick="addProduct()" class="btn w-full">
เพิ่มสินค้า
</button>

</div>

<!-- BANK -->

<div class="bg-white p-4 rounded shadow">

<h3 class="font-bold mb-2">
เปลี่ยนเลขบัญชี
</h3>

<input id="bank-input"
class="border p-2 w-full mb-2">

<button onclick="saveBank()" class="btn w-full">
บันทึก
</button>

</div>

</div>

</div>

</div>

<script>

let products=[
{name:"เว็บร้านค้า",price:199},
{name:"เว็บขายแอพพรีเมียม",price:299},
{name:"เว็บเติมเกม",price:399},
{name:"เว็บขายไอดี",price:499}
]

function renderProducts(){

let grid=document.getElementById("product-grid")
let shop=document.getElementById("shop-grid")

grid.innerHTML=""
shop.innerHTML=""

products.forEach(p=>{

let html=`
<div class="bg-white p-3 rounded shadow">

<div class="h-32 bg-slate-100 flex items-center justify-center text-xs">
IMAGE
</div>

<h3 class="font-bold mt-2">${p.name}</h3>

<div class="flex justify-between mt-2">

<b class="text-pink-500">฿${p.price}</b>

<button class="btn text-xs">เช่า</button>

</div>

</div>
`

grid.innerHTML+=html
shop.innerHTML+=html

})

}

function addProduct(){

let name=document.getElementById("p-name").value
let price=document.getElementById("p-price").value

products.push({name,price})

renderProducts()

}

function saveBank(){

let val=document.getElementById("bank-input").value

document.getElementById("bank-number").innerText=val

alert("บันทึกแล้ว")

}

function topup(){

alert("เติมเงินสำเร็จ +100")

}

function toggleChat(){

let c=document.getElementById("chat-window")

c.style.display=c.style.display==="flex"?"none":"flex"

}

function sendChat(){

let input=document.getElementById("chat-input")

if(!input.value)return

let box=document.getElementById("chat-box")

box.innerHTML+=`<div class="chat-bubble chat-me">${input.value}</div>`

input.value=""

}

function showPage(id){

document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))

document.getElementById("page-"+id).classList.add("active")

}

renderProducts()

</script>

</body>
</html>
