<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CandyMarket</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#0F172A,#1E293B);
color:white;
}

/* HEADER */

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:16px 20px;
background:#020617;
}

.logo{
font-size:22px;
font-weight:bold;
background:linear-gradient(90deg,#7DD3FC,#F9A8D4);
-webkit-background-clip:text;
color:transparent;
}

.login{
background:#2563EB;
padding:10px 16px;
border-radius:10px;
}

/* HERO */

.hero{
padding:40px 20px;
background:url("https://images.unsplash.com/photo-1633412802994-5c058f151b66?q=80&w=2000");
background-size:cover;
background-position:center;
}

.hero h1{
font-size:26px;
}

.hero p{
color:#cbd5f5;
}

.hero button{
margin-top:10px;
background:white;
color:black;
padding:10px 16px;
border-radius:10px;
border:none;
}

/* BANNERS */

.banner-row{
display:flex;
gap:12px;
padding:20px;
}

.banner{
flex:1;
background:#1E293B;
padding:16px;
border-radius:12px;
}

/* ANNOUNCEMENT */

.announce{
display:flex;
gap:12px;
padding:12px 20px;
background:#020617;
overflow:auto;
}

.notice{
background:#111827;
padding:8px 12px;
border-radius:8px;
}

/* STATS */

.stats{
display:flex;
gap:12px;
padding:20px;
}

.stat{
flex:1;
background:#1E293B;
padding:16px;
border-radius:12px;
text-align:center;
}

.stat h2{
margin:0;
font-size:28px;
}

.stat p{
color:#94A3B8;
}

</style>

</head>

<body>

<header>

<div class="logo">
CandyMarket
</div>

<div class="login">
เข้าสู่ระบบ
</div>

</header>

<section class="hero">

<h1>แพลตฟอร์มปล่อยเช่าเว็บไซต์</h1>

<p>
สร้างเว็บร้านค้า เติมเกม หรือขายแอพพรีเมียม
พร้อมระบบหลังบ้านครบ
</p>

<button>
เลือกดูแพ็กเกจ
</button>

</section>


<div class="banner-row">

<div class="banner">

<h3>เปิดร้านง่าย</h3>
<p>สร้างเว็บร้านใน 30 วินาที</p>

</div>

<div class="banner">

<h3>ระบบครบ</h3>
<p>สินค้า แชท แอดมิน หลังบ้าน</p>

</div>

</div>


<div class="announce">

<div class="notice">📢 เปิดระบบใหม่</div>

<div class="notice">🔔 รองรับระบบลูกทีม</div>

<div class="notice">💬 มีระบบแชทลูกค้า</div>

</div>


<div class="stats">

<div class="stat">

<h2>212</h2>
<p>ผู้ใช้ทั้งหมด</p>

</div>

<div class="stat">

<h2>239</h2>
<p>เว็บไซต์ทั้งหมด</p>

</div>

</div>


</body>
</html>
