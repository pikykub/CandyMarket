<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Web Status | CandyMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #fff5f7; font-family: 'Kanit', sans-serif; }
        .grid-bg { background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px); background-size: 25px 25px; }
        .status-card { background: white; border-radius: 2rem; border: 3px solid #fff; transition: 0.3s; }
        .status-card:hover { transform: translateY(-5px); box-shadow: 0 15px 30px rgba(240, 122, 176, 0.1); }
        
        /* จุดไฟสถานะดุ๊กดิ๊ก */
        .dot-online { background: #22c55e; box-shadow: 0 0 10px #22c55e; animation: pulse 2s infinite; }
        .dot-offline { background: #ef4444; box-shadow: 0 0 10px #ef4444; }
        .dot-pending { background: #eab308; box-shadow: 0 0 10px #eab308; animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body class="grid-bg min-h-screen pb-10">

    <header class="p-6 flex items-center justify-between">
        <button onclick="history.back()" class="w-10 h-10 rounded-full bg-white flex items-center justify-center text-pink-400 shadow-sm border-2 border-pink-50">
            <i class="fa-solid fa-chevron-left"></i>
        </button>
        <h1 class="text-xl font-black text-gray-700 italic uppercase tracking-tighter">Web Services Status</h1>
        <div class="w-10"></div>
    </header>

    <div class="px-5 mb-8">
        <div class="bg-gradient-to-r from-[#ff8da1] to-[#8ec5fc] p-6 rounded-[2.5rem] text-white shadow-lg">
            <div class="flex justify-between items-center">
                <div>
                    <p class="text-[10px] font-bold uppercase tracking-widest opacity-80">System Health</p>
                    <h2 class="text-2xl font-black italic">ระบบการเช่าทั้งหมด</h2>
                </div>
                <div class="text-right">
                    <span class="bg-white/20 px-4 py-1 rounded-full text-[10px] font-black uppercase">Real-time Data</span>
                </div>
            </div>
        </div>
    </div>

    <div class="px-5 space-y-4" id="web-status-list">
        <div class="status-card p-5 shadow-sm">
            <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-2xl bg-green-50 text-green-500 flex items-center justify-center text-xl border border-green-100">
                        <i class="fa-solid fa-earth-asia"></i>
                    </div>
                    <div>
                        <h3 class="font-black text-gray-700 leading-tight">PeachWeb Official</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">User: Lukpeach</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 px-3 py-1 bg-green-50 rounded-full">
                    <div class="w-2 h-2 rounded-full dot-online"></div>
                    <span class="text-[10px] font-black text-green-600 uppercase">Online</span>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="bg-gray-50 p-3 rounded-2xl">
                    <p class="text-[9px] text-gray-400 font-bold uppercase">วันหมดอายุ</p>
                    <p class="text-xs font-black text-gray-600"><i class="fa-solid fa-clock-rotate-left mr-1"></i> เหลืออีก 25 วัน</p>
                </div>
                <div class="bg-gray-50 p-3 rounded-2xl text-right">
                    <p class="text-[9px] text-gray-400 font-bold uppercase">สิ้นสุดวันที่</p>
                    <p class="text-xs font-black text-gray-600">15 พ.ค. 2026</p>
                </div>
            </div>

            <a href="#" target="_blank" class="w-full py-3 bg-pink-50 text-pink-500 rounded-xl flex items-center justify-center gap-2 text-xs font-black uppercase tracking-widest hover:bg-pink-100 transition">
                <i class="fa-solid fa-arrow-up-right-from-square"></i> Visit Website
            </a>
        </div>

        <div class="status-card p-5 shadow-sm border-dashed border-yellow-200">
            <div class="flex justify-between items-start mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-12 h-12 rounded-2xl bg-yellow-50 text-yellow-500 flex items-center justify-center text-xl">
                        <i class="fa-solid fa-file-invoice-dollar"></i>
                    </div>
                    <div>
                        <h3 class="font-black text-gray-700 leading-tight">Mariko Shop</h3>
                        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">User: Mariko</p>
                    </div>
                </div>
                <div class="flex items-center gap-2 px-3 py-1 bg-yellow-50 rounded-full">
                    <div class="w-2 h-2 rounded-full dot-pending"></div>
                    <span class="text-[10px] font-black text-yellow-600 uppercase">Pending</span>
                </div>
            </div>
            <p class="text-center text-[10px] text-yellow-600 font-bold bg-yellow-50 py-2 rounded-xl border border-yellow-100 italic">
                <i class="fa-solid fa-circle-info mr-1"></i> รอแอดมินยืนยันยอดชำระเงิน
            </p>
        </div>
    </div>

    <script>
        // ฟังก์ชันคำนวณวันคงเหลือ
        function calculateDaysLeft(expiryDateStr) {
            const now = new Date();
            const expiry = new Date(expiryDateStr);
            const diffTime = expiry - now;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)); 
            return diffDays > 0 ? `เหลืออีก ${diffDays} วัน` : "หมดอายุแล้ว";
        }

        // ในอนาคตพีชใช้ onValue(ref(db, 'rentals')) เพื่อดึงข้อมูลจริงจาก Firebase มาวน Loop ได้เลยงับ
    </script>
</body>
</html>
