<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>เข้าสู่ระบบ | CandyMarket</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

body{
background:#fff5f7;
font-family:'Kanit',sans-serif;
}

.grid-bg{
background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px);
background-size:25px 25px;
}

/* loader */

#loader{
position:fixed;
inset:0;
background:#fff5f7;
z-index:9999;
display:flex;
justify-content:center;
align-items:center;
}

.candy-spinner{
font-size:55px;
color:#f07ab0;
animation:candy-spin 1.5s infinite;
}

@keyframes candy-spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>

</head>

<body class="grid-bg flex items-center justify-center min-h-screen">

<div id="loader">
<div class="candy-spinner">
<i class="fa-solid fa-cookie-bite"></i>
</div>
</div>

<div class="bg-white p-8 rounded-[2rem] shadow-lg border-2 border-pink-100 w-[90%] max-w-md">

<h2 class="text-3xl font-black text-center text-pink-500 mb-6">
CandyMarket
</h2>

<input id="login-input"
placeholder="Username หรือ Email"
class="w-full mb-4 px-4 py-3 rounded-xl border-2 border-pink-100">

<input id="login-pass"
type="password"
placeholder="Password"
class="w-full mb-5 px-4 py-3 rounded-xl border-2 border-pink-100">

<button onclick="loginUser()"
class="w-full bg-gradient-to-r from-[#f07ab0] to-[#ffb347] text-white py-3 rounded-xl font-black mb-4">

เข้าสู่ระบบ

</button>

<button onclick="loginGoogle()"
class="w-full border-2 border-pink-200 py-3 rounded-xl font-bold flex justify-center gap-2">

<i class="fa-brands fa-google"></i>
เข้าสู่ระบบด้วย Google

</button>

<p class="text-center text-sm mt-5">

ยังไม่มีบัญชี ?

<a href="register.html" class="text-pink-500 font-bold">
สมัครสมาชิก
</a>

</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";

import { getAuth, signInWithEmailAndPassword, GoogleAuthProvider, signInWithPopup }

from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";

import { getDatabase, ref, get }

from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBORnXLQdZnETh9AMFMUx50FlLylKCVc2w",
authDomain:"web-rental-system-d8894.firebaseapp.com",
projectId:"web-rental-system-d8894",
databaseURL:"https://web-rental-system-d8894-default-rtdb.asia-southeast1.firebasedatabase.app"
}

const app=initializeApp(firebaseConfig)

const auth=getAuth(app)

const db=getDatabase(app)

const provider=new GoogleAuthProvider()

window.onload=()=>{

setTimeout(()=>{

document.getElementById("loader").style.display="none"

},800)

}

window.loginUser=async function(){

let input=document.getElementById("login-input").value
let pass=document.getElementById("login-pass").value

let email=input

if(!input.includes("@")){

let snap=await get(ref(db,"usernames/"+input))

if(!snap.exists()){
alert("ไม่พบ Username")
return
}

email=snap.val()

}

signInWithEmailAndPassword(auth,email,pass)
.then(()=>{

location.href="dashboard.html"

})
.catch(()=>{

alert("เข้าสู่ระบบไม่สำเร็จ")

})

}

window.loginGoogle=function(){

signInWithPopup(auth,provider)
.then(()=>{

location.href="dashboard.html"

})

}

</script>

</body>
</html>
