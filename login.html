<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>Candy Market Login</title>

<style>
body{
font-family:sans-serif;
background:#fff0f6;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
}

.login-box{
background:white;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
width:300px;
text-align:center;
}

h2{
color:#ff6fa5;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:8px;
border:1px solid #ddd;
}

button{
width:100%;
padding:10px;
background:#ff6fa5;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

button:hover{
background:#ff4f91;
}

.error{
color:red;
font-size:14px;
}
</style>

</head>
<body>

<div class="login-box">

<h2>Candy Market</h2>

<input id="username" placeholder="Username">

<input id="password" type="password" placeholder="Password">

<button onclick="login()">เข้าสู่ระบบ</button>

<p class="error" id="error"></p>

</div>

<script>

const adminUser = "adminpeach"
const adminPass = "khao155454"

function login(){

let user = document.getElementById("username").value
let pass = document.getElementById("password").value

if(user === adminUser && pass === adminPass){

localStorage.setItem("candyUser", user)

window.location.href = "dashboard.html"

}else{

document.getElementById("error").innerText = "ชื่อผู้ใช้หรือรหัสผ่านผิด"

}

}

// Auto Login
if(localStorage.getItem("candyUser")){
window.location.href = "dashboard.html"
}

</script>

</body>
</html>
