<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>เข้าสู่ระบบ | Candy Market</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
font-family: "Kanit", sans-serif;
}

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(#ffc0d9 2px, transparent 2px);
background-size:30px 30px;
background-color:#fff4fa;
}

/* card */

.login-card{
background:white;
padding:35px;
border-radius:22px;
width:350px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
text-align:center;
}

/* logo */

.logo{
font-size:28px;
margin-bottom:5px;
}

.title{
font-size:22px;
font-weight:600;
margin-bottom:20px;
}

/* input */

.input-box{
position:relative;
margin-bottom:15px;
}

.input-box i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#ff7db8;
}

input{
width:100%;
padding:12px 12px 12px 38px;
border-radius:12px;
border:1px solid #eee;
font-size:14px;
}

/* button */

.login-btn{
width:100%;
padding:12px;
border:none;
background:#ff7db8;
color:white;
border-radius:12px;
font-size:15px;
cursor:pointer;
margin-top:10px;
}

.login-btn:hover{
background:#ff5fa8;
}

/* register */

.register{
margin-top:18px;
font-size:14px;
}

.register a{
color:#ff5fa8;
text-decoration:none;
font-weight:500;
}

/* mobile */

@media(max-width:420px){

.login-card{
width:90%;
padding:28px;
}

}

</style>
</head>

<body>

<div class="login-card">

<div class="logo">🍬</div>
<div class="title">Candy Market</div>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="อีเมล">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="รหัสผ่าน">
</div>

<button class="login-btn">เข้าสู่ระบบ</button>

<div class="register">
ยังไม่มีบัญชี ?
<a href="register.html">สมัครสมาชิก</a>
</div>

</div>

</body>
</html>
