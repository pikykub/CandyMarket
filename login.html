<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | CandyMarket</title>

<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;900&display=swap" rel="stylesheet">

<style>
body{
background:#fff5f7;
font-family:'Kanit',sans-serif;
}

.grid-bg{
background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px);
background-size:25px 25px;
}
</style>

</head>

<body class="grid-bg flex items-center justify-center min-h-screen">

<div class="bg-white p-8 rounded-3xl shadow-xl border-2 border-pink-100 w-[90%] max-w-md">

<h2 class="text-3xl font-black text-center text-pink-500 mb-6">
CandyMarket
</h2>

<input id="login-input"
type="text"
placeholder="Username หรือ Email"
class="w-full mb-4 px-4 py-3 rounded-xl border-2 border-pink-100 outline-none">

<input id="login-pass"
type="password"
placeholder="รหัสผ่าน"
class="w-full mb-5 px-4 py-3 rounded-xl border-2 border-pink-100 outline-none">

<button onclick="loginUser()"
class="w-full bg-gradient-to-r from-[#f07ab0] to-[#ffb347] text-white py-3 rounded-xl font-black">
เข้าสู่ระบบ
</button>

<p class="text-center text-sm mt-5">
ยังไม่มีบัญชี ?
<a href="register.html" class="text-pink-500 font-bold">สมัครสมาชิก</a>
</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyBORnXLQdZnETh9AMFMUx50FlLylKCVc2w",
authDomain: "web-rental-system-d8894.firebaseapp.com",
projectId: "web-rental-system-d8894",
databaseURL: "https://web-rental-system-d8894-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

window.loginUser = async function(){

let input=document.getElementById("login-input").value
let pass=document.getElementById("login-pass").value

let email=input

if(!input.includes("@")){

let snap=await get(ref(db,"usernames/"+input))

if(!snap.exists()){
alert("ไม่พบ Username")
return
}

email=snap.val()

}

signInWithEmailAndPassword(auth,email,pass)
.then(()=>{
location.href="index.html"
})
.catch(()=>{
alert("เข้าสู่ระบบไม่สำเร็จ")
})

}

</script>

</body>
</html>
