<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เข้าสู่ระบบ | Candy Market</title>

<style>
body{
    font-family: sans-serif;
    background:#FFF5FA;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    background:white;
    padding:40px;
    border-radius:20px;
    width:320px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    text-align:center;
}

h2{
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    width:100%;
    padding:12px;
    border:none;
    background:#ff69b4;
    color:white;
    border-radius:10px;
    cursor:pointer;
}

button:hover{
    background:#ff4da6;
}
</style>

</head>

<body>

<div class="login-box">

<h2>เข้าสู่ระบบ</h2>

<input type="email" id="email" placeholder="Email">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">เข้าสู่ระบบ</button>

</div>

<script>

function login(){

let email = document.getElementById("email").value
let password = document.getElementById("password").value

if(email === "" || password === ""){
alert("กรุณากรอกข้อมูล")
return
}

// ตัวอย่างระบบจำลอง
if(email === "admin@candy.com" && password === "1234"){

alert("เข้าสู่ระบบสำเร็จ")

window.location.href="/admin.html"

}else{

alert("อีเมลหรือรหัสผ่านไม่ถูกต้อง")

}

}

</script>

</body>
</html>
