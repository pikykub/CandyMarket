<!DOCTYPE html>
<html lang="th">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>เข้าสู่ระบบ | CandyMarket</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;900&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
background:#fff5f7;
font-family:'Kanit',sans-serif;
}

.grid-bg{
background-image: radial-gradient(#ffcad4 1.5px, transparent 1.5px);
background-size:25px 25px;
}

#loader{
position:fixed;
inset:0;
background:#fff5f7;
z-index:9999;
display:flex;
align-items:center;
justify-content:center;
}

.candy-spinner{
font-size:60px;
color:#f07ab0;
animation:spin 1.5s infinite;
}

@keyframes spin{
0%{transform:rotate(0)}
100%{transform:rotate(360deg)}
}

</style>

</head>

<body class="grid-bg flex items-center justify-center min-h-screen">

<div id="loader">
<div class="candy-spinner">
<i class="fa-solid fa-cookie-bite"></i>
</div>
</div>

<div class="bg-white p-8 rounded-[2rem] border-2 border-pink-100 shadow-xl w-[90%] max-w-md">

<h1 class="text-3xl font-black text-center text-pink-500 mb-2">
CandyMarket
</h1>

<p class="text-center text-pink-400 font-bold mb-6 text-sm">
เข้าสู่ระบบเพื่อจัดการเว็บไซต์ของคุณ 🍬
</p>

<input id="login-user"
placeholder="Username"
class="w-full mb-3 px-4 py-3 rounded-xl border-2 border-pink-100">

<input id="login-pass"
type="password"
placeholder="Password"
class="w-full mb-4 px-4 py-3 rounded-xl border-2 border-pink-100">

<button onclick="loginUser()"
class="w-full bg-gradient-to-r from-[#f07ab0] to-[#ffb347] text-white py-3 rounded-xl font-black mb-4">

เข้าสู่ระบบ

</button>

<p class="text-center text-sm">

ยังไม่มีบัญชี ?

<a href="register.html" class="text-pink-500 font-bold">
สมัครสมาชิก
</a>

</p>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js"

import { getAuth, signInWithEmailAndPassword }

from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js"

import { getDatabase, ref, get }

from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js"

const firebaseConfig={
apiKey:"ใส่ของลูกพีช",
authDomain:"ใส่ของลูกพีช",
projectId:"ใส่ของลูกพีช",
databaseURL:"ใส่ของลูกพีช"
}

const app=initializeApp(firebaseConfig)

const auth=getAuth(app)

const db=getDatabase(app)

window.onload=()=>{

setTimeout(()=>{
document.getElementById("loader").style.display="none"
},800)

}

window.loginUser=async function(){

let user=document.getElementById("login-user").value
let pass=document.getElementById("login-pass").value

/* 👑 ADMIN LOGIN */

if(user==="adminpeach"){

if(pass==="khao155454"){

location.href="admin.html"

}else{

alert("รหัสผ่านแอดมินไม่ถูกต้อง")

}

return

}

/* 👤 USER LOGIN */

let snap=await get(ref(db,"usernames/"+user))

if(!snap.exists()){

alert("ไม่พบชื่อผู้ใช้")

return

}

let email=snap.val()

signInWithEmailAndPassword(auth,email,pass)

.then(()=>{

location.href="dashboard.html"

})

.catch(()=>{

alert("รหัสผ่านไม่ถูกต้อง")

})

}

</script>

</body>
</html>
