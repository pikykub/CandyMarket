<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Candy Market Login</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Quicksand',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
radial-gradient(#ffd4e8 1.5px, transparent 1.5px);
background-size:28px 28px;
background-color:#fff7fb;
}

.card{
width:360px;
background:white;
padding:36px;
border-radius:26px;
box-shadow:0 20px 50px rgba(255,150,200,0.15);
text-align:center;
}

.brand{
font-family:'Mali',cursive;
font-size:28px;
color:#ff6fae;
margin-bottom:25px;
}

.input-box{
position:relative;
margin-bottom:15px;
}

.input-box i{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
color:#ff8fbe;
}

input{
width:100%;
padding:12px 14px 12px 40px;
border-radius:14px;
border:1px solid #f0d9e6;
font-size:14px;
outline:none;
}

.login-btn{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff8fbe,#ff6fae);
color:white;
font-size:15px;
cursor:pointer;
}

.login-btn:hover{
box-shadow:0 8px 20px rgba(255,120,170,.25);
}

.register{
margin-top:18px;
font-size:14px;
}

.register a{
color:#ff6fae;
text-decoration:none;
}

.spinner{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,.6);
display:flex;
align-items:center;
justify-content:center;
display:none;
}

.cookie{
width:60px;
height:60px;
border-radius:50%;
border:8px solid #ffd4e8;
border-top-color:#ff6fae;
animation:spin 1s linear infinite;
}

@keyframes spin{
to{transform:rotate(360deg)}
}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#ff6fae;
color:white;
padding:12px 20px;
border-radius:20px;
font-size:14px;
opacity:0;
transition:.3s;
}

</style>
</head>

<body>

<div class="card">

<div class="brand">Candy Market</div>

<div class="input-box">
<i class="fa-regular fa-envelope"></i>
<input type="email" id="email" placeholder="อีเมล">
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="password" placeholder="รหัสผ่าน">
</div>

<button class="login-btn" onclick="loginUser()">เข้าสู่ระบบ</button>

<div class="register">
ยังไม่มีบัญชี ? <a href="register.html">สมัครสมาชิก</a>
</div>

</div>

<div class="spinner" id="loading">
<div class="cookie"></div>
</div>

<div class="toast" id="toast"></div>

<script>

function showToast(text){

let toast=document.getElementById("toast")
toast.innerText=text
toast.style.opacity=1

setTimeout(()=>{
toast.style.opacity=0
},2500)

}

function showLoading(){
document.getElementById("loading").style.display="flex"
}

function loginUser(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let user=JSON.parse(localStorage.getItem("user"))

if(!user){
showToast("ไม่พบบัญชีผู้ใช้")
return
}

if(email!==user.email || password!==user.password){
showToast("อีเมลหรือรหัสผ่านไม่ถูกต้อง")
return
}

showLoading()

setTimeout(()=>{
window.location.href="index.html"
},1200)

}

</script>

</body>
</html>
