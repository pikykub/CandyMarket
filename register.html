<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สมัครสมาชิก</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Quicksand',sans-serif;
}

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;

background:
radial-gradient(#ffd4e8 1.5px, transparent 1.5px);
background-size:28px 28px;
background-color:#fff7fb;
}

.card{
width:360px;
background:white;
padding:36px;
border-radius:26px;
box-shadow:0 20px 50px rgba(255,150,200,0.15);
text-align:center;
}

.brand{
font-family:'Mali',cursive;
font-size:26px;
color:#ff6fae;
margin-bottom:20px;
}

.input-box{
position:relative;
margin-bottom:14px;
}

.input-box i{
position:absolute;
left:14px;
top:50%;
transform:translateY(-50%);
color:#ff8fbe;
}

input{
width:100%;
padding:12px 14px 12px 40px;
border-radius:14px;
border:1px solid #f0d9e6;
}

button{
width:100%;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff8fbe,#ff6fae);
color:white;
cursor:pointer;
}

.toast{
position:fixed;
bottom:30px;
left:50%;
transform:translateX(-50%);
background:#ff6fae;
color:white;
padding:12px 20px;
border-radius:20px;
opacity:0;
transition:.3s;
}

</style>
</head>

<body>

<div class="card">

<div class="brand">Candy Market</div>

<div class="input-box">
<i class="fa-regular fa-envelope"></i>
<input type="email" id="email" placeholder="อีเมล">
</div>

<div class="input-box">
<i class="fa-solid fa-lock"></i>
<input type="password" id="password" placeholder="รหัสผ่าน">
</div>

<button onclick="register()">สมัครสมาชิก</button>

</div>

<div class="toast" id="toast"></div>

<script>

function showToast(text){

let toast=document.getElementById("toast")
toast.innerText=text
toast.style.opacity=1

setTimeout(()=>{
toast.style.opacity=0
},2500)

}

function register(){

let email=document.getElementById("email").value
let password=document.getElementById("password").value

let user={
email:email,
password:password,
username:email.split("@")[0],
nickname:"ผู้ใช้ใหม่"
}

localStorage.setItem("user",JSON.stringify(user))

showToast("สมัครสมาชิกสำเร็จ")

setTimeout(()=>{
window.location.href="index.html"
},1200)

}

</script>

</body>
</html>
