<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>สมัครสมาชิก | Candy Market</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(#ffc0d9 2px, transparent 2px);
background-size:30px 30px;
background-color:#fff4fa;
font-family:"Kanit",sans-serif;
}

.card{
background:white;
padding:35px;
border-radius:22px;
width:350px;
box-shadow:0 15px 40px rgba(0,0,0,0.08);
text-align:center;
}

.input-box{
position:relative;
margin-bottom:15px;
}

.input-box i{
position:absolute;
left:12px;
top:50%;
transform:translateY(-50%);
color:#ff7db8;
}

input{
width:100%;
padding:12px 12px 12px 38px;
border-radius:12px;
border:1px solid #eee;
}

button{
width:100%;
padding:12px;
border:none;
background:#ff7db8;
color:white;
border-radius:12px;
font-size:15px;
cursor:pointer;
}

button:hover{
background:#ff5fa8;
}

</style>
</head>

<body>

<div class="card">

<h2>สมัครสมาชิก</h2>

<div class="input-box">
<i class="fa fa-envelope"></i>
<input type="email" placeholder="อีเมล">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="รหัสผ่าน">
</div>

<div class="input-box">
<i class="fa fa-lock"></i>
<input type="password" placeholder="ยืนยันรหัสผ่าน">
</div>

<button onclick="register()">สมัครสมาชิก</button>

</div>

<script>

function register(){

alert("สมัครสมาชิกสำเร็จ")

window.location.href="login.html"

}

</script>

</body>
</html>
