<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>โปรไฟล์ | Candy Market</title>

<link href="https://fonts.googleapis.com/css2?family=Mali:wght@300;400;500&family=Quicksand:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

*{
box-sizing:border-box;
margin:0;
padding:0;
font-family:'Quicksand',sans-serif;
}

body{
background:
radial-gradient(#ffd4e8 1.5px, transparent 1.5px);
background-size:28px 28px;
background-color:#fff7fb;
display:flex;
justify-content:center;
padding:40px 20px;
}

.card{

width:380px;
background:white;
border-radius:26px;
padding:30px;
box-shadow:0 20px 50px rgba(255,150,200,0.15);
text-align:center;

}

/* profile image */

.profile-img{

width:110px;
height:110px;
border-radius:50%;
object-fit:cover;
border:4px solid #ffd4e8;
margin-bottom:12px;

}

/* edit button */

.edit-img{

font-size:13px;
color:#ff6fae;
cursor:pointer;
margin-bottom:20px;

}

/* info */

.info{

text-align:left;
margin-top:10px;

}

.info label{

font-size:13px;
color:#888;

}

.info input{

width:100%;
margin-top:6px;
margin-bottom:14px;
padding:10px;
border-radius:12px;
border:1px solid #f0d9e6;

}

/* save button */

.save-btn{

width:100%;
padding:12px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#ff8fbe,#ff6fae);
color:white;
font-size:14px;
cursor:pointer;

}

</style>
</head>

<body>

<div class="card">

<img id="profileImg" class="profile-img">

<div class="edit-img">
<i class="fa-solid fa-pen"></i> เปลี่ยนรูปโปรไฟล์
</div>

<input type="file" id="uploadImg" accept="image/*" style="display:none">

<div class="info">

<label>ชื่อเล่น</label>
<input type="text" id="nickname">

<label>ชื่อผู้ใช้</label>
<input type="text" id="username" disabled>

</div>

<button class="save-btn" onclick="saveProfile()">
<i class="fa-solid fa-floppy-disk"></i>
บันทึกข้อมูล
</button>

</div>

<script>

/* candy avatar icons (ไม่ใช่สติ๊กเกอร์) */

const candyAvatars = [

"https://api.iconify.design/mdi/candy-outline.svg",
"https://api.iconify.design/mdi/lollipop.svg",
"https://api.iconify.design/mdi/candycane.svg",
"https://api.iconify.design/mdi/candy.svg"

]

/* load profile */

function loadProfile(){

let user = JSON.parse(localStorage.getItem("user"))

if(!user){

user = {
username:"guest",
nickname:"ผู้ใช้ใหม่",
avatar:candyAvatars[Math.floor(Math.random()*candyAvatars.length)]
}

localStorage.setItem("user",JSON.stringify(user))

}

document.getElementById("username").value = user.username
document.getElementById("nickname").value = user.nickname
document.getElementById("profileImg").src = user.avatar

}

/* upload image */

document.querySelector(".edit-img").onclick = ()=>{

document.getElementById("uploadImg").click()

}

document.getElementById("uploadImg").addEventListener("change",function(){

const file = this.files[0]

if(file){

const reader = new FileReader()

reader.onload = function(e){

document.getElementById("profileImg").src = e.target.result

}

reader.readAsDataURL(file)

}

})

/* save */

function saveProfile(){

let user = JSON.parse(localStorage.getItem("user"))

user.nickname = document.getElementById("nickname").value
user.avatar = document.getElementById("profileImg").src

localStorage.setItem("user",JSON.stringify(user))

alert("บันทึกโปรไฟล์แล้ว")

}

loadProfile()

</script>

</body>
</html>
